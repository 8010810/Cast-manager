function signInWithGoogle() {
  var provider = new firebase.auth.GoogleAuthProvider();
  return auth.signInWithPopup(provider);
}
function fbSignOut() { return auth.signOut(); }

function loadFromDB(uid) {
  return db.collection('users').doc(uid).collection('data').doc('main').get()
    .then(function(doc) {
      if (doc.exists) {
        var d = doc.data();
        return { casts:d.casts||[], records:d.records||{}, customers:d.customers||{} };
      }
      return { casts:[], records:{}, customers:{} };
    }).catch(function() { return { casts:[], records:{}, customers:{} }; });
}

function saveToDB(uid, data) {
  return db.collection('users').doc(uid).collection('data').doc('main').set({
    casts: data.casts,
    records: data.records,
    customers: data.customers
  }).catch(function(e) { console.error('Save error:', e); });
}

function AIPage(p){
  var s1=useState('idle');var status=s1[0];var setStatus=s1[1]; // idle|loading|done|error
  var s2=useState('');var result=s2[0];var setResult=s2[1];
  var s3=useState('overall');var analysisType=s3[0];var setAnalysisType=s3[1];

  var castObj=p.data.casts.find(function(c){return c.id===p.castId;})||{};
  var allRows=p.data.records[p.castId]||[];
  var allCust=p.data.customers[p.castId]||[];
  var now=new Date();
  var tm=now.getFullYear()+'-'+pad(now.getMonth()+1);

  var ANALYSIS_TYPES=[
    {key:'overall',label:'総合分析',icon:'📊'},
    {key:'sales',label:'売上改善',icon:'💰'},
    {key:'customers',label:'顧客分析',icon:'👥'},
    {key:'advice',label:'戦略アドバイス',icon:'🎯'},
  ];

  function buildPrompt(){
    // 直近6ヶ月のデータを集計
    var months=[];
    for(var i=5;i>=0;i--){
      var d=new Date(now.getFullYear(),now.getMonth()-i,1);
      var mk=d.getFullYear()+'-'+pad(d.getMonth()+1);
      var rows=allRows.filter(function(r){return r.date.slice(0,7)===mk;});
      var target=getMonthlyTarget(castObj,mk);
      months.push({
        month:(d.getMonth()+1)+'\u6708',
        sales:rows.reduce(function(s,r){return s+Number(r.sales||0);},0),
        companions:rows.reduce(function(s,r){return s+Number(r.companions||0);},0),
        nominations:rows.reduce(function(s,r){return s+Number(r.nominations||0);},0),
        workDays:rows.length,
        floorCount:rows.reduce(function(s,r){return s+Number(r.floorCount||0);},0),
        target:target
      });
    }

    // 顧客データ集計
    var custTypes={'\u6307\u540d':0,'\u5834\u5185':0,'\u540c\u4f34':0};
    var bottleMap={};
    allCust.slice(0,50).forEach(function(c){
      if(custTypes[c.type]!=null)custTypes[c.type]++;
      if(c.bottleNeck)bottleMap[c.bottleNeck]=(bottleMap[c.bottleNeck]||0)+1;
    });
    var topBottles=Object.entries(bottleMap).sort(function(a,b){return b[1]-a[1];}).slice(0,5).map(function(e){return e[0]+'('+e[1]+'\u672c)';});

    var typeMap={
      'overall':'\u3053\u306e\u30ad\u30e3\u30b9\u30c8\u306e\u58f2\u4e0a\u30c7\u30fc\u30bf\u3092\u5206\u6790\u3057\u3001\u7dcf\u5408\u7684\u306a\u30b3\u30e1\u30f3\u30c8\u3068\u6539\u5584\u70b9\u3092\u65e5\u672c\u8a9e\u3067\u6559\u3048\u3066\u304f\u3060\u3055\u3044\u3002',
      'sales':'\u58f2\u4e0a\u30c8\u30ec\u30f3\u30c9\u3092\u5206\u6790\u3057\u3001\u58f2\u4e0a\u5411\u4e0a\u306e\u305f\u3081\u306e\u5177\u4f53\u7684\u306a\u30a2\u30c9\u30d0\u30a4\u30b9\u3092\u65e5\u672c\u8a9e\u3067\u6559\u3048\u3066\u304f\u3060\u3055\u3044\u3002',
      'customers':'\u9867\u5ba2\u30c7\u30fc\u30bf\u3092\u5206\u6790\u3057\u3001\u6307\u540d\u30fb\u5834\u5185\u30fb\u540c\u4f34\u306e\u30d0\u30e9\u30f3\u30b9\u3084\u9867\u5ba2\u5c64\u306b\u3064\u3044\u3066\u30a2\u30c9\u30d0\u30a4\u30b9\u3092\u65e5\u672c\u8a9e\u3067\u6559\u3048\u3066\u304f\u3060\u3055\u3044\u3002',
      'advice':'\u591c\u8077\u696d\u306e\u30ad\u30e3\u30b9\u30c8\u3068\u3057\u3066\u58f2\u4e0a\u3092\u4f38\u3070\u3059\u305f\u3081\u306e\u6230\u7565\u7684\u306a\u30a2\u30c9\u30d0\u30a4\u30b9\u3092\u65e5\u672c\u8a9e\u3067\u6559\u3048\u3066\u304f\u3060\u3055\u3044\u3002'
    };

    return '\u3042\u306a\u305f\u306f\u591c\u8077\u696d\uff08\u30ca\u30a4\u30c8\u30af\u30e9\u30d6\uff09\u306e\u30ad\u30e3\u30b9\u30c8\u30de\u30cd\u30fc\u30b8\u30e3\u30fc\u5411\u3051\u5206\u6790AI\u3067\u3059\u3002\n\n'
      +'\u30ad\u30e3\u30b9\u30c8\u540d: '+castObj.name+'\n\n'
      +'\u300c\u76f4\u8fd16\u30f6\u6708\u306e\u30c7\u30fc\u30bf\u300d\n'
      +months.map(function(m){
        var pct=m.target>0?Math.round(m.sales/m.target*100)+'%\u9054\u6210':'';
        return m.month+': \u58f2\u4e0a'+yen(m.sales)+(m.target>0?' ('+pct+', \u76ee\u6a19'+yen(m.target)+')':'')+', \u51fa\u52e4'+m.workDays+'\u65e5, \u6307\u540d'+m.nominations+'\u7d44, \u540c\u4f34'+m.companions+'\u56de, \u5834\u5185'+m.floorCount+'\u7d44';
      }).join('\n')
      +'\n\n\u300c\u9867\u5ba2\u30bf\u30a4\u30d7\u5185\u8a33\u300d\n'
      +'\u6307\u540d: '+custTypes['\u6307\u540d']+'\u7d44, \u5834\u5185: '+custTypes['\u5834\u5185']+'\u7d44, \u540c\u4f34: '+custTypes['\u540c\u4f34']+'\u56de'

      +'\n\n'+typeMap[analysisType]
      +'\n\n\u56de\u7b54\u306f500\u6587\u5b57\u4ee5\u5185\u3067\u7c21\u6f54\u306b\u3001\u7b87\u6761\u66f8\u304d\u3067\u307e\u3068\u3081\u3066\u304f\u3060\u3055\u3044\u3002';
  }

  function analyze(){
    setStatus('loading');setResult('');
    fetch('https://api.anthropic.com/v1/messages',{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({
        model:'claude-sonnet-4-20250514',
        max_tokens:1000,
        messages:[{role:'user',content:buildPrompt()}]
      })
    })
    .then(function(r){return r.json();})
    .then(function(d){
      if(d.content&&d.content[0]&&d.content[0].text){
        setResult(d.content[0].text);setStatus('done');
      } else {
        setResult('\u5206\u6790\u306b\u5931\u6557\u3057\u307e\u3057\u305f');setStatus('error');
      }
    })
    .catch(function(){setResult('\u30cd\u30c3\u30c8\u30ef\u30fc\u30af\u30a8\u30e9\u30fc\u304c\u767a\u751f\u3057\u307e\u3057\u305f');setStatus('error');});
  }

  return e('div',null,
    e('div',{style:S.pageTitle},
      e('h2',{style:S.h2},'🤖 AI\u5206\u6790'),
      e('div',{style:{color:'#6b7280',fontSize:'12px'}},castObj.name||'')
    ),

    // 分析タイプ選択
    e('div',{style:{display:'flex',gap:'8px',flexWrap:'wrap',marginBottom:'16px'}},
      ANALYSIS_TYPES.map(function(t){
        return e('button',{key:t.key,
          style:{padding:'8px 14px',borderRadius:'20px',border:'1px solid',fontSize:'13px',cursor:'pointer',fontWeight:500,
            borderColor:analysisType===t.key?'#a78bfa':'#374151',
            color:analysisType===t.key?'#a78bfa':'#6b7280',
            background:analysisType===t.key?'#a78bfa15':'transparent'},
          onClick:function(){setAnalysisType(t.key);setStatus('idle');setResult('');}},
          t.icon+' '+t.label
        );
      })
    ),

    // 分析ボタン
    e('button',{
      style:Object.assign({},S.btnPrimary,{width:'100%',padding:'14px',fontSize:'15px',marginBottom:'20px',
        opacity:status==='loading'?0.7:1,cursor:status==='loading'?'not-allowed':'pointer',
        background:'linear-gradient(135deg,#7c3aed,#a78bfa)'}),
      onClick:analyze,
      disabled:status==='loading'

    // 結果表示
    status==='loading'&&e('div',{style:{background:'#12122a',border:'1px solid #2d2d4e',borderRadius:'12px',padding:'24px',textAlign:'center'}},
      e('div',{style:{color:'#a78bfa',fontSize:'14px',marginBottom:'8px'}},'🤖 \u5206\u6790\u4e2d...'),
      e('div',{style:{color:'#6b7280',fontSize:'12px'}},'\u3057\u3070\u3089\u304f\u304a\u5f85\u3061\u304f\u3060\u3055\u3044')
    ),

  );
}

    ),

    layer==='team'&&e('header',{style:S.header},
      e('div',{style:S.logo},e('span',{style:S.logoIcon},'✶'),e('span',{style:S.logoText},'CAST MANAGER'))
    ),

    e('main',{style:S.main},
      layer==='home'&&e(HomePage,{data:data,persist:persist,onOpenCast:openCast,notify:notify,onOpenTeam:openTeam}),
      layer==='team'&&e(TeamPage,{data:data,onClose:goHome}),
      layer==='cast'&&selectedCast&&e(Fragment,null,
        castPage==='input'&&e(InputPage,{castId:selectedCast,data:data,persist:persist,notify:notify}),
        castPage==='chart'&&e(ChartPage,{castId:selectedCast,data:data}),
        castPage==='list'&&e(ListPage,{castId:selectedCast,data:data,persist:persist,notify:notify}),
        castPage==='customers'&&e(CustomerPage,{castId:selectedCast,data:data,persist:persist,notify:notify}),
        castPage==='ai'&&e(AIPage,{castId:selectedCast,data:data})
      )
    )
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(e(App,null));
})();
</script>
</body>
</html>
