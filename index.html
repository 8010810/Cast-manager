  if(!cast.folderHistory||cast.folderHistory.length===0){

class FolderErrorBoundary extends React.Component{

  render(){

function MyCastPage(p){
  var s1=useState(null);var editFolderId=s1[0];var setEditFolderId=s1[1];
  var s2=useState('');var folderName=s2[0];var setFolderName=s2[1];
  // openFolderをAppから受け取る（castページから戻った時に復元）
  var openFolder=p.openFolderProp||null;
  var setOpenFolder=p.setOpenFolderProp||function(){};
  var s4=useState(false);var showAddFolder=s4[0];var setShowAddFolder=s4[1];

  var folders=p.data.folders||[];

  // フォルダ開いた時にsubBackを設定
  React.useEffect(function(){
    if(!p.isActive)return; // castページ表示中は上書きしない
    if(p.onSetSubBack){
      if(openFolder){
        p.onSetSubBack(function(){setOpenFolder(null);return false;});
      } else {
        p.onSetSubBack(null);
      }
    }
  },[openFolder,p.isActive]);

  function addFolder(){
    var name=folderName.trim();if(!name)return;
    var newFolder={id:uid(),name:name,castIds:[]};
    p.persist(Object.assign({},p.data,{folders:[...folders,newFolder]}));
    setFolderName('');setShowAddFolder(false);p.notify(name+' フォルダを追加しました');
  }
  function deleteFolder(fid,name){
    if(!confirm(name+' フォルダを削除しますか？'))return;
    p.persist(Object.assign({},p.data,{folders:folders.filter(function(f){return f.id!==fid;})}));
  }
  function saveFolder(fid){
    p.persist(Object.assign({},p.data,{folders:folders.map(function(f){return f.id===fid?Object.assign({},f,{name:folderName}):f;})}));
    setEditFolderId(null);p.notify('フォルダ名を変更しました');
  }

  if(openFolder){
    var folder=folders.find(function(f){return f.id===openFolder;});
    if(!folder){setOpenFolder(null);return null;}
    var folderCasts=p.data.casts.filter(function(c){return(folder.castIds||[]).includes(c.id);});
    return e(FolderDetail,{folder:folder,folderCasts:folderCasts,data:p.data,onOpenCast:p.onOpenCast,notify:p.notify,uid:p.uid,onSetSubBack:p.onSetSubBack,onRestoreFolder:function(){setOpenFolder(openFolder);}});
  }

  return e('div',null,
    e('div',{style:S.pageTitle},
      e('h1',{style:S.h1},'MG実績'),
      e('button',{style:S.btnPrimary,onClick:function(){setShowAddFolder(!showAddFolder);}},showAddFolder?'キャンセル':'+ フォルダ追加')
    ),
    showAddFolder&&e('div',{style:S.addForm},
      e('input',{style:{...S.input,marginBottom:0},placeholder:'フォルダ名を入力',value:folderName,autoFocus:true,onChange:function(ev){setFolderName(ev.target.value);},onKeyDown:function(ev){if(ev.key==='Enter')addFolder();}}),
      e('button',{style:S.btnPrimary,onClick:addFolder},'追加')
    ),
    folders.length===0

function CastListPage(p){
  var s1=useState('');var query=s1[0];var setQuery=s1[1];
  var s2=useState(null);var detail=s2[0];var setDetail=s2[1];
  var s3=useState(false);var showAdd=s3[0];var setShowAdd=s3[1];
  var s4=useState('');var newName=s4[0];var setNewName=s4[1];
  var s5=useState('');var newFolder=s5[0];var setNewFolder=s5[1];
  var s6=useState('');var newShift=s6[0];var setNewShift=s6[1];
  var s_af=useState({});var addForm=s_af[0];var setAddForm=s_af[1];
  var s7=useState(null);var editCast=s7[0];var setEditCast=s7[1];
  var s8=useState({});var editForm=s8[0];var setEditForm=s8[1];
  var s9=useState('name');var sortBy=s9[0];var setSortBy=s9[1];

  var folders=p.data.folders||[];

  React.useEffect(function(){
    if(p.onSetSubBack){
      if(detail){p.onSetSubBack(function(){return function(){setDetail(null);setEditCast(null);};});}
      else{p.onSetSubBack(null);}
    }
  },[detail]);

  var sorted=useMemo(function(){
    var list=[...p.data.casts];
    if(sortBy==='name')list.sort(function(a,b){return a.name.localeCompare(b.name,'ja');});
    else if(sortBy==='age')list.sort(function(a,b){var aa=calcAge(a.birthday)||999;var bb=calcAge(b.birthday)||999;return aa-bb;});
    else if(sortBy==='height')list.sort(function(a,b){return Number(b.height||0)-Number(a.height||0);});
    return list;
  },[p.data.casts,sortBy]);

  var filtered=useMemo(function(){
    var q=query.trim().toLowerCase();
    if(!q)return sorted;
    return sorted.filter(function(c){
      return[c.name,c.realName,c.hometown,c.memo,c.contractShift,String(c.height||''),c.birthday?fmtDate(c.birthday):''].join(' ').toLowerCase().includes(q);
    });

  function addCast(){
    var name=newName.trim();if(!name)return;
    if(p.data.casts.find(function(c){return c.name===name;})){p.notify('同じ名前が既に存在します','error');return;}
    var id=Date.now().toString();
    var now3=new Date();var initMK=now3.getFullYear()+'-'+pad(now3.getMonth()+1);var initFid=newFolder||(p.data.folders.find(function(f){return f.name==='新入店';})||{}).id||'';var newCast={id:id,name:name,birthday:addForm.birthday||'',memo:addForm.memo||'',monthlyTargets:{},contractShift:newShift,realName:addForm.realName||'',hometown:addForm.hometown||'',height:addForm.height||'',folderHistory:[{folderId:initFid,from:initMK}]};

      return f;
    });
    p.persist({...p.data,casts:[...p.data.casts,newCast],records:{...p.data.records,[id]:[]},customers:{...p.data.customers,[id]:[]},folders:newFolders});

  function saveEdit(id){
    var now2=new Date();
    var curMK=now2.getFullYear()+'-'+pad(now2.getMonth()+1);
    var updated=p.data.casts.map(function(c){
      if(c.id!==id)return c;
      var base=Object.assign({},c,editForm);
      // フォルダが変わった場合、履歴に記録
      if(editForm.folderId){
        var currentFolder=(p.data.folders||[]).find(function(f){return(f.castIds||[]).includes(id);});
        var currentFolderId=currentFolder?currentFolder.id:null;
        if(editForm.folderId!==currentFolderId){
          var existingHist=c.folderHistory||[];
          // 既存履歴がない場合、現在のフォルダを「最初から今月前まで」として記録
          if(existingHist.length===0&&currentFolderId){
            // 最古の売上レコードの月を初期登録月とする

    var newFolders=(p.data.folders||[]).map(function(f){

    setEditCast(null);p.notify('保存しました');
  }

  function deleteCastItem(id,name){

    var casts=p.data.casts.filter(function(c){return c.id!==id;});
    var records=Object.assign({},p.data.records);delete records[id];

          }}, '編集'),

          e('div',{style:{fontSize:'20px',fontWeight:700,color:'#f3f4f6'}},cast.name),

              e('option',{value:''},'変更しない'),

            e('textarea',{style:{...S.input,minHeight:'70px',resize:'vertical',fontFamily:'inherit'},value:editForm.memo||'',onChange:function(ev){setEditForm(function(fm){return{...fm,memo:ev.target.value};})},placeholder:'メモ...'}),
            e('div',{style:{display:'flex',gap:'8px',justifyContent:'flex-end'}},
              e('button',{style:S.btnGhost,onClick:function(){setEditCast(null);}}, 'キャンセル'),
              e('button',{style:S.btnPrimary,onClick:function(){saveEdit(detail);}}, '保存')

             ['契約シフト',cast.contractShift||'未設定'],['所属フォルダ',castFolderName||'未設定'],['メモ',cast.memo||'なし']].map(function(row){
              return e('div',{key:row[0],style:{display:'flex',gap:'8px',marginBottom:'10px',fontSize:'14px'}},
                e('span',{style:{color:'#6b7280',minWidth:'100px',flexShrink:0}},row[0]),
                e('span',{style:{color:'#e5e7eb',wordBreak:'break-word'}},row[1])

function ShiftPage(p){
  var now=new Date();
  var s1=useState(now.getFullYear()+'-'+pad(now.getMonth()+1));var currentYM=s1[0];var setCurrentYM=s1[1];
  var s2=useState('week');var viewMode=s2[0];var setViewMode=s2[1];
  var s3=useState('');var query=s3[0];var setQuery=s3[1];
  var s4=useState(null);var editCell=s4[0];var setEditCell=s4[1];
  var s5=useState({status:'work',time:''});var editVal=s5[0];var setEditVal=s5[1];
  var s6=useState(false);var aiLoading=s6[0];var setAiLoading=s6[1];
  var s7=useState('');var aiResult=s7[0];var setAiResult=s7[1];
  var s8=useState(false);var showAI=s8[0];var setShowAI=s8[1];
  var s9=useState(function(){var d=new Date();d.setDate(d.getDate()-d.getDay());return d.getFullYear()+'-'+pad(d.getMonth()+1)+'-'+pad(d.getDate());});
  var weekStart=s9[0];var setWeekStart=s9[1];
  var s10=useState(false);var showCalView=s10[0];var setShowCalView=s10[1];
  // カレンダービューでタップした日
  var s11=useState(null);var calSelDate=s11[0];var setCalSelDate=s11[1];
  // 定数シフト設定（曜日ごと）: {0:3,1:4,...} 日=0〜土=6
  var s12=useState({});var quotaMap=s12[0];var setQuotaMap=s12[1];
  var s13=useState(false);var showQuota=s13[0];var setShowQuota=s13[1];

  var shifts=p.data.shifts||{};
  var ymParts=currentYM.split('-');var yr=Number(ymParts[0]);var mo=Number(ymParts[1]);
  var daysInMonth=new Date(yr,mo,0).getDate();
  var dayLabels=['日','月','火','水','木','金','土'];

  function getWeekDates(){
    var dates=[];var d=new Date(weekStart);
    for(var i=0;i<7;i++){dates.push(d.getFullYear()+'-'+pad(d.getMonth()+1)+'-'+pad(d.getDate()));d.setDate(d.getDate()+1);}
    return dates;
  }
  function prevWeek(){var d=new Date(weekStart);d.setDate(d.getDate()-7);setWeekStart(d.getFullYear()+'-'+pad(d.getMonth()+1)+'-'+pad(d.getDate()));}
  function nextWeek(){var d=new Date(weekStart);d.setDate(d.getDate()+7);setWeekStart(d.getFullYear()+'-'+pad(d.getMonth()+1)+'-'+pad(d.getDate()));}
  function prevMonth(){var d=new Date(yr,mo-2,1);setCurrentYM(d.getFullYear()+'-'+pad(d.getMonth()+1));}
  function nextMonth(){var d=new Date(yr,mo,1);setCurrentYM(d.getFullYear()+'-'+pad(d.getMonth()+1));}

  var filteredCasts=useMemo(function(){
    var q=query.trim().toLowerCase();
    if(!q)return p.data.casts;
    return p.data.casts.filter(function(c){return c.name.toLowerCase().includes(q);});
  },[p.data.casts,query]);

  function getShift(castId,date){return(shifts[castId]||{})[date]||null;}
  function setShiftData(castId,date,val){
    var ns=Object.assign({},shifts);
    if(!ns[castId])ns[castId]={};
    if(val===null){delete ns[castId][date];}else{ns[castId][date]=val;}
    p.persist(Object.assign({},p.data,{shifts:ns}));

function TargetModal(p){
  var s1=useState(null);var editTarget=s1[0];var setEditTarget=s1[1];
  var s2=useState('');var targetInput=s2[0];var setTargetInput=s2[1];
  var castObj=p.data.casts.find(function(c){return c.id===p.castId;})||{};
  var now=new Date();var tm=now.getFullYear()+'-'+pad(now.getMonth()+1);

  function getMonthList(){
    var list=[];for(var i=-11;i<=2;i++){var d=new Date(now.getFullYear(),now.getMonth()+i,1);list.push(d.getFullYear()+'-'+pad(d.getMonth()+1));}
    return list;
  }
  function saveTarget(mk){
    var val=Number(targetInput||0);
    p.persist(Object.assign({},p.data,{casts:p.data.casts.map(function(c){
      if(c.id!==p.castId)return c;
      var mt=Object.assign({},c.monthlyTargets||{});
      if(val===0)delete mt[mk];else mt[mk]=val;
      return Object.assign({},c,{monthlyTargets:mt});
    })}));
    setEditTarget(null);p.notify('目標売上を保存しました');
  }
  var monthList=getMonthList();
  return e('div',{style:{background:'#12122a',border:'1px solid #1e2035',borderRadius:'12px',padding:'16px',marginBottom:'16px'}},
    e('div',{style:{color:'#e8b86d',fontWeight:700,fontSize:'14px',marginBottom:'12px'}},'🎯 月別目標売上'),
    monthList.map(function(mk){
      var mt=getMonthlyTarget(castObj,mk);
      var parts=mk.split('-');var label=parts[0]+'年'+Number(parts[1])+'月';
      var isEditing=editTarget===mk;
      return e('div',{key:mk,style:{display:'flex',alignItems:'center',gap:'8px',padding:'6px 0',borderBottom:'1px solid #1e2035'}},
        e('span',{style:{color:mk===tm?'#e8b86d':'#9ca3af',fontSize:'13px',minWidth:'80px',fontWeight:mk===tm?700:400}},label+(mk===tm?' ◀':'')),
        isEditing
          ?e(Fragment,null,
            e('input',{type:'number',style:{background:'#0d0d1a',border:'1px solid #2d2d4e',borderRadius:'6px',color:'#e5e7eb',fontSize:'13px',padding:'4px 8px',flex:1,outline:'none'},value:targetInput,autoFocus:true,onChange:function(ev){setTargetInput(ev.target.value);},onKeyDown:function(ev){if(ev.key==='Enter')saveTarget(mk);}}),
            e('button',{style:{background:'#e8b86d',border:'none',borderRadius:'6px',color:'#0d0d1a',fontSize:'12px',fontWeight:700,padding:'4px 10px',cursor:'pointer'},onClick:function(){saveTarget(mk);}},'保存'),
            e('button',{style:{background:'transparent',border:'none',color:'#6b7280',fontSize:'12px',cursor:'pointer'},onClick:function(){setEditTarget(null);}},'✕')
          )
          :e(Fragment,null,
            e('span',{style:{color:mt>0?'#e5e7eb':'#4b5563',fontSize:'13px',flex:1}},mt>0?yen(mt):'未設定'),
            e('button',{style:S.bdEditBtn,onClick:function(){setEditTarget(mk);setTargetInput(mt>0?String(mt):'');}},mt>0?'変更':'設定')
          )
      );
    })
  );
}

    var slots=[];var startMin=timeSetting.startHour*60;
    for(var i=0;i<24;i++){var sm=startMin+i*timeSetting.interval;if(sm>=1440)break;slots.push({label:pad(Math.floor(sm/60))+':'+pad(sm%60),startMin:sm,endMin:sm+timeSetting.interval});}
    return slots;
  }
  function getCurrentSlot(){
    var total=now.getHours()*60+now.getMinutes();var start=timeSetting.startHour*60;
    if(total<start)return null;
    var i=Math.floor((total-start)/timeSetting.interval);var ss=start+i*timeSetting.interval;
    return{slotStart:ss,slotEnd:ss+timeSetting.interval};
  }

  var boardData=useMemo(function(){
    var slots=getSlots();var curSlot=getCurrentSlot();
    var douhan=[];var bySlot=[];var passing=[];var absent=[];var notPassed=[];
    allTodayCasts.forEach(function(item){
      var c=item.cast;var att=getAtt(c.id);var st=att.status;var tm=att.time;
      if(st==='同伴'){douhan.push({cast:c,time:tm});return;}
      if(st==='当欠'){absent.push({cast:c,time:tm});return;}
      if(st==='通過'){passing.push({cast:c,time:tm});return;}
      if(st==='出勤'){
        var tMin=tm?parseInt(tm.split(':')[0])*60+parseInt(tm.split(':')[1]):null;
        var slot=null;
        if(tMin!=null)for(var i=0;i<slots.length;i++){if(tMin>=slots[i].startMin&&tMin<slots[i].endMin){slot=slots[i];break;}}
        if(!slot&&slots.length>0)slot=slots[slots.length-1];
        var sl=slot?slot.label:'--:--';
        var ex=bySlot.find(function(s){return s.label===sl;});
        if(ex)ex.casts.push({cast:c,time:tm});
        else bySlot.push({label:sl,startMin:slot?slot.startMin:0,casts:[{cast:c,time:tm}]});
        return;
      }
      if(st==='未通過'){
        var ss2=item.shiftTime;
        if(!ss2){notPassed.push({cast:c,shiftTime:''});return;}
        var sm2=parseInt(ss2.split(':')[0])*60+parseInt(ss2.split(':')[1]);
        if(!curSlot)return;
        if(sm2>curSlot.slotEnd)return;
        notPassed.push({cast:c,shiftTime:ss2});
      }
    });
    bySlot.sort(function(a,b){return a.startMin-b.startMin;});
    bySlot.forEach(function(sl){sl.casts.sort(function(a,b){return(a.time||'').localeCompare(b.time||'');});});
    passing.sort(function(a,b){return(a.time||'').localeCompare(b.time||'');});
    return{douhan:douhan,bySlot:bySlot,passing:passing,absent:absent,notPassed:notPassed};
  },[attStatus,allTodayCasts,timeSetting]);

  var searchResults=useMemo(function(){

      });

  },[absenceData,absMonth]);

                    onClick:function(){

                      else setStatus(item.cast.id,st,'');

        e('div',{style:{color:'#9ca3af',fontSize:'12px'}},timeSetting.startHour+'時〜 '+timeSetting.interval+'分刻み'),
        e('div',{style:{display:'flex',gap:'8px'}},
          e('button',{style:{background:editMode?'#e8b86d22':'transparent',border:'1px solid '+(editMode?'#e8b86d':'#374151'),borderRadius:'8px',padding:'6px 10px',color:editMode?'#e8b86d':'#6b7280',fontSize:'12px',cursor:'pointer'},onClick:function(){setEditMode(!editMode);}},editMode?'✕ 編集中':'✏ 編集'),
          e('button',{style:{background:'transparent',border:'1px solid #374151',borderRadius:'8px',padding:'6px 10px',color:'#6b7280',fontSize:'12px',cursor:'pointer'},onClick:function(){if(p.uid)db.collection('users').doc(p.uid).collection('attendance').doc(todayStr).get().then(function(doc){if(doc.exists)setAttStatus(doc.data().status||{});});}},'↻ 更新')
        )
      ),
      boardData.douhan.length>0&&e('div',null,e('div',{style:secStyle},'同伴'),boardData.douhan.map(function(item){return e('div',{key:item.cast.id,style:Object.assign({},rowStyle,{cursor:editMode?'pointer':'default'}),onClick:editMode?function(){setEditTarget({castId:item.cast.id,time:item.time});}:undefined},e('span',{style:{fontWeight:700,fontSize:'14px',color:'#a78bfa'}},item.cast.name),item.time&&e('span',{style:{fontSize:'12px',color:'#9ca3af'}},item.time));})),
      boardData.bySlot.map(function(slot){return e('div',{key:slot.label},e('div',{style:{fontSize:'12px',color:'#4b5563',padding:'6px 0 2px',fontWeight:600}},slot.label),slot.casts.map(function(item){return e('div',{key:item.cast.id,style:Object.assign({},rowStyle,{cursor:editMode?'pointer':'default'}),onClick:editMode?function(){setEditTarget({castId:item.cast.id,time:item.time});}:undefined},e('span',{style:{fontWeight:700,fontSize:'14px',color:'#60a5fa'}},item.cast.name),item.time&&e('span',{style:{fontSize:'12px',color:'#9ca3af'}},item.time));}));}),
