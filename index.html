var calcAge=function(birthday){
  if(!birthday)return null;
  var parts=birthday.split('-');
  var now=new Date();var bd=new Date(Number(parts[0]),Number(parts[1])-1,Number(parts[2]));
  var age=now.getFullYear()-bd.getFullYear();
  if(now.getMonth()<bd.getMonth()||(now.getMonth()===bd.getMonth()&&now.getDate()<bd.getDate()))age--;
  return age;
};

var getMonthlyTarget=function(cast,monthKey){if(cast.monthlyTargets&&cast.monthlyTargets[monthKey]!=null)return Number(cast.monthlyTargets[monthKey]);return 0;};

function aggregate(records,castId,mode){
  var rows=records[castId]||[];var map={};
  rows.forEach(function(r){
    var key=mode==='daily'?r.date:mode==='monthly'?r.date.slice(0,7):r.date.slice(0,4);

// フォルダ詳細コンポーネント（フックをトップレベルで使うため分離）
function FolderDetail(p){
  var now=new Date();
  var tm=now.getFullYear()+'-'+pad(now.getMonth()+1);
  var s1=useState(null);var qrCast=s1[0];var setQrCast=s1[1];

  var fcAllYears=useMemo(function(){
    var ys=new Set();
    p.folderCasts.forEach(function(c){(p.data.records[c.id]||[]).forEach(function(r){ys.add(r.date.slice(0,4));});});
    ys.add(String(now.getFullYear()));
    return Array.from(ys).sort(function(a,b){return b.localeCompare(a);});
  },[p.folderCasts,p.data.records]);

  var s2=useState(String(now.getFullYear()));var fcYear=s2[0];var setFcYear=s2[1];

  var monthlyData=useMemo(function(){
    var list=[];
    for(var mi=1;mi<=12;mi++){
      var mk2=fcYear+'-'+pad(mi);
      var totalS=0;var totalT=0;
      p.folderCasts.forEach(function(c){
        var rows=(p.data.records[c.id]||[]).filter(function(r){return r.date.slice(0,7)===mk2;});
        totalS+=rows.reduce(function(s,r){return s+Number(r.sales||0);},0);
        totalT+=getMonthlyTarget(c,mk2);
      });
      list.push({month:mi+'月',sales:totalS,target:totalT>0?totalT:null});
    }

function MyCastPage(p){

  var s2=useState('');var folderName=s2[0];var setFolderName=s2[1];
  var s3=useState(null);var openFolder=s3[0];var setOpenFolder=s3[1];
  var s4=useState(false);var showAddFolder=s4[0];var setShowAddFolder=s4[1];

  var folders=p.data.folders||[];

  // フォルダ開いた時にsubBackを設定
  React.useEffect(function(){
    if(p.onSetSubBack){
      if(openFolder){p.onSetSubBack(function(){return function(){setOpenFolder(null);};});}
      else{p.onSetSubBack(null);}
    }
  },[openFolder]);

  function addFolder(){
    var name=folderName.trim();if(!name)return;
    var newFolder={id:uid(),name:name,castIds:[]};
    p.persist(Object.assign({},p.data,{folders:[...folders,newFolder]}));
    setFolderName('');setShowAddFolder(false);p.notify(name+' フォルダを追加しました');
  }

    if(!confirm(name+' フォルダを削除しますか？'))return;
    p.persist(Object.assign({},p.data,{folders:folders.filter(function(f){return f.id!==fid;})}));
  }
  function saveFolder(fid){
    p.persist(Object.assign({},p.data,{folders:folders.map(function(f){return f.id===fid?Object.assign({},f,{name:folderName}):f;})}));
    setEditFolderId(null);p.notify('フォルダ名を変更しました');

  if(openFolder){
    var folder=folders.find(function(f){return f.id===openFolder;});

      :folders.map(function(folder){
        var fCasts=p.data.casts.filter(function(c){return(folder.castIds||[]).includes(c.id);});
        return e('div',{key:folder.id,style:{background:'#12122a',border:'1px solid #1e2035',borderRadius:'12px',marginBottom:'10px',overflow:'hidden'}},
          e('div',{style:{display:'flex',alignItems:'center',gap:'10px',padding:'14px 16px',cursor:'pointer'},onClick:function(){setOpenFolder(folder.id);}},
            e('span',{style:{fontSize:'20px'}},'📁'),
            editFolderId===folder.id
              ?e('div',{style:{display:'flex',gap:'8px',flex:1},onClick:function(ev){ev.stopPropagation();}},
                e('input',{style:{...S.input,marginBottom:0,flex:1,fontSize:'13px',padding:'6px 10px'},value:folderName,autoFocus:true,onChange:function(ev){setFolderName(ev.target.value);}}),
                e('button',{style:{...S.btnPrimary,padding:'6px 12px',fontSize:'12px'},onClick:function(){saveFolder(folder.id);}},'保存'),
                e('button',{style:S.btnGhost,onClick:function(){setEditFolderId(null);}},'✕')
              )
              :e(Fragment,null,
                e('div',{style:{flex:1}},
                  e('div',{style:{fontWeight:700,color:'#f3f4f6',fontSize:'14px'}},folder.name),
                  e('div',{style:{color:'#6b7280',fontSize:'12px'}},fCasts.length+'名')

                e('button',{style:S.bdEditBtn,onClick:function(ev){ev.stopPropagation();setEditFolderId(folder.id);setFolderName(folder.name);}},'編集'),
                e('button',{style:{...S.btnDanger,marginLeft:'4px'},onClick:function(ev){ev.stopPropagation();deleteFolder(folder.id,folder.name);}},'削除'),

            e('div',{style:{display:'flex',gap:'8px',justifyContent:'flex-end'}},

// ─── シフト管理ページ ──────────────────────────────────────────────────────────
var SHIFT_STATUSES=[
  {key:'off',label:'休み',color:'#4b5563',bg:'#1e2035'},
  {key:'work',label:'出勤',color:'#34d399',bg:'#34d39918'},
  {key:'douhan',label:'同伴',color:'#a78bfa',bg:'#a78bfa18'},
  {key:'pending',label:'保留',color:'#fbbf24',bg:'#fbbf2418'},
];

function ShiftPage(p){
  var now=new Date();
  var s1=useState(now.getFullYear()+'-'+pad(now.getMonth()+1));var currentYM=s1[0];var setCurrentYM=s1[1];
  var s2=useState('week');var viewMode=s2[0];var setViewMode=s2[1];
  var s3=useState('');var query=s3[0];var setQuery=s3[1];
  var s4=useState(null);var editCell=s4[0];var setEditCell=s4[1];
  var s5=useState({status:'work',time:''});var editVal=s5[0];var setEditVal=s5[1];
  var s6=useState(false);var aiLoading=s6[0];var setAiLoading=s6[1];
  var s7=useState('');var aiResult=s7[0];var setAiResult=s7[1];
  var s8=useState(false);var showAI=s8[0];var setShowAI=s8[1];
  var s9=useState(function(){var d=new Date();d.setDate(d.getDate()-d.getDay());return d.getFullYear()+'-'+pad(d.getMonth()+1)+'-'+pad(d.getDate());});
  var weekStart=s9[0];var setWeekStart=s9[1];
  var s10=useState(false);var showCalView=s10[0];var setShowCalView=s10[1];
  // カレンダービューでタップした日
  var s11=useState(null);var calSelDate=s11[0];var setCalSelDate=s11[1];
  // 定数シフト設定（曜日ごと）: {0:3,1:4,...} 日=0〜土=6
  var s12=useState({});var quotaMap=s12[0];var setQuotaMap=s12[1];
  var s13=useState(false);var showQuota=s13[0];var setShowQuota=s13[1];

  var shifts=p.data.shifts||{};
  var ymParts=currentYM.split('-');var yr=Number(ymParts[0]);var mo=Number(ymParts[1]);
  var daysInMonth=new Date(yr,mo,0).getDate();
  var dayLabels=['日','月','火','水','木','金','土'];

  function getWeekDates(){
    var dates=[];var d=new Date(weekStart);
    for(var i=0;i<7;i++){dates.push(d.getFullYear()+'-'+pad(d.getMonth()+1)+'-'+pad(d.getDate()));d.setDate(d.getDate()+1);}
    return dates;
  }
  function prevWeek(){var d=new Date(weekStart);d.setDate(d.getDate()-7);setWeekStart(d.getFullYear()+'-'+pad(d.getMonth()+1)+'-'+pad(d.getDate()));}
  function nextWeek(){var d=new Date(weekStart);d.setDate(d.getDate()+7);setWeekStart(d.getFullYear()+'-'+pad(d.getMonth()+1)+'-'+pad(d.getDate()));}
  function prevMonth(){var d=new Date(yr,mo-2,1);setCurrentYM(d.getFullYear()+'-'+pad(d.getMonth()+1));}
  function nextMonth(){var d=new Date(yr,mo,1);setCurrentYM(d.getFullYear()+'-'+pad(d.getMonth()+1));}

  var filteredCasts=useMemo(function(){
    var q=query.trim().toLowerCase();
    if(!q)return p.data.casts;
    return p.data.casts.filter(function(c){return c.name.toLowerCase().includes(q);});
  },[p.data.casts,query]);

  function getShift(castId,date){return(shifts[castId]||{})[date]||null;}
  function setShiftData(castId,date,val){
    var ns=Object.assign({},shifts);
    if(!ns[castId])ns[castId]={};
    if(val===null){delete ns[castId][date];}else{ns[castId][date]=val;}
    p.persist(Object.assign({},p.data,{shifts:ns}));
  }
  function openEdit(castId,date){var cur=getShift(castId,date);setEditCell({castId:castId,date:date});setEditVal(cur||{status:'work',time:''});}
  function saveEdit(){setShiftData(editCell.castId,editCell.date,editVal);setEditCell(null);}
  function clearShift(){setShiftData(editCell.castId,editCell.date,null);setEditCell(null);}

  // 当月の曜日別出勤数と定数の差異を計算
  // 今週の曜日別出勤人数を計算
  var weekdayDiff=useMemo(function(){
    // 今週（weekDates）の各日の出勤人数
    var wdates=getWeekDates();
    return Array(7).fill(0).map(function(_,i){
      var date=wdates[i];
      var cnt=p.data.casts.reduce(function(sum,c){
        var sh=getShift(c.id,date);
        return sum+(sh&&(sh.status==='work'||sh.status==='douhan')?1:0);
      },0);
      var quota=Number(quotaMap[i]||0);
      return{day:dayLabels[i],quota:quota,actual:cnt,diff:quota>0?(cnt-quota):null};
    });
  },[shifts,p.data.casts,weekStart,quotaMap]);

  // AI分析
  function runAI(){
    setAiLoading(true);setAiResult('');setShowAI(true);
    var tm=now.getFullYear()+'-'+pad(now.getMonth()+1);
    var summary=p.data.casts.map(function(c){
      var workDays=Object.entries(shifts[c.id]||{}).filter(function(e){return e[0].slice(0,7)===tm&&(e[1].status==='work'||e[1].status==='douhan');}).length;
      return{name:c.name,contract:c.contractShift||'未設定',workDays:workDays};
    });
    var prompt='ナイトクラブのシフト管理AIとして分析してください。\n今月('+( now.getMonth()+1)+'月)のシフト状況:\n'
      +summary.map(function(c){return c.name+': 契約シフト['+c.contract+'] / 今月出勤'+c.workDays+'日';}).join('\n')

// ─── AIPage ───────────────────────────────────────────────────────────────────
function AIPage(p){
  var s1=useState('idle');var status=s1[0];var setStatus=s1[1];
  var s2=useState('');var result=s2[0];var setResult=s2[1];

  var now=new Date();

  function analyze(){
    setStatus('loading');setResult('');
    var months=[];
    for(var i=5;i>=0;i--){
      var d=new Date(now.getFullYear(),now.getMonth()-i,1);
      var mk=d.getFullYear()+'-'+pad(d.getMonth()+1);
      var rows=allRows.filter(function(r){return r.date.slice(0,7)===mk;});
      var target=getMonthlyTarget(castObj,mk);
      months.push({month:(d.getMonth()+1)+'月',sales:rows.reduce(function(s,r){return s+Number(r.sales||0);},0),companions:rows.reduce(function(s,r){return s+Number(r.companions||0);},0),nominations:rows.reduce(function(s,r){return s+Number(r.nominations||0);},0),workDays:rows.length,floorCount:rows.reduce(function(s,r){return s+Number(r.floorCount||0);},0),target:target});

    var topBottles=Object.entries(bottleMap).sort(function(a,b){return b[1]-a[1];}).slice(0,5).map(function(e){return e[0]+'('+e[1]+'本)';});
    var prompt='あなたは夜職（ナイトクラブ）のキャストマネージャー向け分析AIです。\n\nキャスト名: '+castObj.name+'\n\n【直近6ヶ月のデータ】\n'
      +months.map(function(m){var pct=m.target>0?Math.round(m.sales/m.target*100)+'%達成':'';return m.month+': 売上'+yen(m.sales)+(m.target>0?' ('+pct+', 目標'+yen(m.target)+')':'')+', 出勤'+m.workDays+'日, 指名'+m.nominations+'組, 同伴'+m.companions+'回, 場内'+m.floorCount+'組';}).join('\n')

    .then(function(r){return r.json();})
    .then(function(d){setResult(d.content&&d.content[0]?d.content[0].text:'分析に失敗しました');setStatus('done');})
    .catch(function(){setResult('ネットワークエラーが発生しました');setStatus('error');});

    status==='done'&&result&&e('div',{style:{background:'#12122a',border:'1px solid #a78bfa44',borderRadius:'12px',padding:'20px'}},
      e('div',{style:{display:'flex',alignItems:'center',gap:'8px',marginBottom:'16px'}},e('span',{style:{fontSize:'16px'}},'🤖'),e('span',{style:{color:'#a78bfa',fontWeight:700,fontSize:'14px'}},'AI分析結果')),

  var monthList=getMonthList();
  return e('div',{style:{background:'#12122a',border:'1px solid #1e2035',borderRadius:'12px',padding:'16px',marginBottom:'16px'}},
    e('div',{style:{color:'#e8b86d',fontWeight:700,fontSize:'14px',marginBottom:'12px'}},'🎯 月別目標売上'),
    monthList.map(function(mk){
      var mt=getMonthlyTarget(castObj,mk);
      var parts=mk.split('-');var label=parts[0]+'年'+Number(parts[1])+'月';
      var isEditing=editTarget===mk;
      return e('div',{key:mk,style:{display:'flex',alignItems:'center',gap:'8px',padding:'6px 0',borderBottom:'1px solid #1e2035'}},
        e('span',{style:{color:mk===tm?'#e8b86d':'#9ca3af',fontSize:'13px',minWidth:'80px',fontWeight:mk===tm?700:400}},label+(mk===tm?' ◀':'')),
        isEditing
          ?e(Fragment,null,
            e('input',{type:'number',style:{background:'#0d0d1a',border:'1px solid #2d2d4e',borderRadius:'6px',color:'#e5e7eb',fontSize:'13px',padding:'4px 8px',flex:1,outline:'none'},value:targetInput,autoFocus:true,onChange:function(ev){setTargetInput(ev.target.value);},onKeyDown:function(ev){if(ev.key==='Enter')saveTarget(mk);}}),
            e('button',{style:{background:'#e8b86d',border:'none',borderRadius:'6px',color:'#0d0d1a',fontSize:'12px',fontWeight:700,padding:'4px 10px',cursor:'pointer'},onClick:function(){saveTarget(mk);}},'保存'),
            e('button',{style:{background:'transparent',border:'none',color:'#6b7280',fontSize:'12px',cursor:'pointer'},onClick:function(){setEditTarget(null);}},'✕')
          )
          :e(Fragment,null,
            e('span',{style:{color:mt>0?'#e5e7eb':'#4b5563',fontSize:'13px',flex:1}},mt>0?yen(mt):'未設定'),
            e('button',{style:S.bdEditBtn,onClick:function(){setEditTarget(mk);setTargetInput(mt>0?String(mt):'');}},mt>0?'変更':'設定')
          )
      );
    })
  );
}

// ─── Main App ─────────────────────────────────────────────────────────────────
function App(){
  var s1=useState(null);var user=s1[0];var setUser=s1[1];
  var s2=useState(null);var data=s2[0];var setData=s2[1];
  var s3=useState(true);var loading=s3[0];var setLoading=s3[1];
  // navStack: ['home', 'mycast', ...] スタック方式
  var s4=useState(['home']);var navStack=s4[0];var setNavStack=s4[1];
  var s5=useState('input');var castPage=s5[0];var setCastPage=s5[1];
  var s6=useState(null);var selectedCast=s6[0];var setSC=s6[1];
  var s7=useState(null);var toast=s7[0];var setToast=s7[1];
  // サブページの戻り先（mycast内のopenFolder, castlist内のdetailなど）
  var s8=useState(null);var subBack=s8[0];var setSubBack=s8[1];

  var layer=navStack[navStack.length-1]||'home';

  function navigate(pg){setNavStack(function(st){return [...st,pg];});setSubBack(null);}
  function goHome(){setNavStack(['home']);setSubBack(null);}
  function goBack(){
    if(subBack){subBack();setSubBack(null);return;}
    setNavStack(function(st){return st.length>1?st.slice(0,-1):['home'];});
  }

  useEffect(function(){
    var unsubscribe=auth.onAuthStateChanged(function(u){
      setUser(u);
      if(u){setLoading(true);loadFromDB(u.uid).then(function(d){
        var nd=Object.assign({casts:[],records:{},customers:{},folders:[],shifts:{},visits:[]},d);
        if(!nd.folders||nd.folders.length===0){nd.folders=[{id:uid(),name:'新入店',castIds:[]}];}
        setData(nd);setLoading(false);
      });}else{setData(null);setLoading(false);}
    });
    return unsubscribe;
  },[]);

  function notify(msg,type){setToast({msg:msg,type:type||'success'});setTimeout(function(){setToast(null);},2800);}
  function persist(next){setData(next);if(user)saveToDB(user.uid,next);}
  function openCast(id){setSC(id);setCastPage('input');navigate('cast');}
  function handleSignOut(){if(!confirm('ログアウトしますか？'))return;fbSignOut().then(function(){setData(null);setNavStack(['home']);setSC(null);});}

  if(loading)return e('div',{style:{minHeight:'100vh',background:'#0d0d1a',display:'flex',alignItems:'center',justifyContent:'center'}},e('div',{style:{color:'#e8b86d',fontSize:'14px',letterSpacing:'2px'}},'LOADING...'));
  if(!user)return e(LoginScreen,null);
  if(!data)return e('div',{style:{minHeight:'100vh',background:'#0d0d1a',display:'flex',alignItems:'center',justifyContent:'center'}},e('div',{style:{color:'#e8b86d',fontSize:'14px',letterSpacing:'2px'}},'データを読み込み中...'));

  var cast=data.casts.find(function(c){return c.id===selectedCast;});
  var isCastLayer=layer==='cast';
  var isHomeLayer=layer==='home';
  var isSubPage=layer!=='home';
  var pageTitle=layer==='mycast'?'担当キャスト':layer==='sales'?'売上管理':layer==='castlist'?'キャスト一覧':layer==='shift'?'シフト管理':'';

  return e('div',{style:S.root},
    toast&&e('div',{style:Object.assign({},S.toast,{background:toast.type==='error'?'#7f1d1d':'#14532d'})},toast.msg),

    // ヘッダー
    e('header',{style:S.header},
      isHomeLayer
        ?e('div',{style:S.logo},e('span',{style:S.logoIcon},'✦'),e('span',{style:S.logoText},'CAST MANAGER'))
        :e('div',{style:{display:'flex',alignItems:'center',gap:'6px'}},
          e('button',{style:{...S.homeBtn,fontSize:'12px',padding:'6px 12px'},onClick:goBack},'‹ 戻る'),
          e('button',{style:{background:'transparent',border:'1px solid #2d2d4e',borderRadius:'8px',color:'#6b7280',fontSize:'11px',padding:'6px 10px',cursor:'pointer',display:'flex',alignItems:'center',gap:'4px'},onClick:goHome},
            e('span',{style:{fontSize:'13px'}},'🏠'),e('span',null,'ホーム')
          )
        ),
      isHomeLayer
        ?e('div',{style:{display:'flex',alignItems:'center',gap:'10px'}},
          e('img',{src:user.photoURL||'',style:{width:'28px',height:'28px',borderRadius:'50%',border:'1px solid #2d2d4e'},onError:function(ev){ev.target.style.display='none';}}),
          e('span',{style:{color:'#9ca3af',fontSize:'12px'}},user.displayName||user.email),
          e('button',{style:Object.assign({},S.btnGhost,{fontSize:'12px',padding:'5px 10px'}),onClick:handleSignOut},'ログアウト')
        )
        :isCastLayer&&cast
          ?e('div',{style:{display:'flex',alignItems:'center',gap:'8px',flex:1,justifyContent:'center'}},
            e('div',{style:{width:'26px',height:'26px',borderRadius:'50%',background:'linear-gradient(135deg,#e8b86d,#a78bfa)',display:'flex',alignItems:'center',justifyContent:'center',fontSize:'12px',fontWeight:700,color:'#0d0d1a'}},cast.name[0]),
            e('span',{style:{color:'#e8b86d',fontWeight:700,fontSize:'14px'}},cast.name)
          )
          :e('span',{style:{color:'#e8b86d',fontWeight:700,fontSize:'14px'}},pageTitle)
    ),

    // キャストタブバー
    isCastLayer&&cast&&e(CastTabBar,{castPage:castPage,setCastPage:setCastPage}),

    // メインコンテンツ
    e('main',{style:S.main},
      isHomeLayer&&e(HomeScreen,{data:data,onNavigate:navigate}),
      layer==='mycast'&&e(MyCastPage,{data:data,persist:persist,notify:notify,onOpenCast:openCast,uid:user?user.uid:'',onSetSubBack:setSubBack}),
      layer==='sales'&&e(SalesPage,{data:data,persist:persist,notify:notify,onOpenCast:openCast}),
      layer==='castlist'&&e(CastListPage,{data:data,persist:persist,notify:notify,onSetSubBack:setSubBack}),
      layer==='shift'&&e(ShiftPage,{data:data,persist:persist,notify:notify}),
      layer==='visit'&&e(VisitPage,{data:data,persist:persist,notify:notify}),
      isCastLayer&&selectedCast&&e(Fragment,null,
        castPage==='input'&&e(InputPage,{castId:selectedCast,data:data,persist:persist,notify:notify}),
        castPage==='chart'&&e(ChartPage,{castId:selectedCast,data:data}),
        castPage==='list'&&e(ListPage,{castId:selectedCast,data:data,persist:persist,notify:notify}),
        castPage==='customers'&&e(CustomerPage,{castId:selectedCast,data:data,persist:persist,notify:notify}),
        castPage==='ai'&&e(AIPage,{castId:selectedCast,data:data})
      )
    )
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(e(App,null));
})();
</script></body></html>
