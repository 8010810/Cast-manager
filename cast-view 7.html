<!doctype html>
<html lang="ja">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>CAST VIEWER</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700&display=swap" rel="stylesheet"/>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#0d0d1a;color:#e5e7eb;font-family:'Noto Sans JP','Hiragino Sans',sans-serif;min-height:100vh;padding:16px;max-width:600px;margin:0 auto}
.spinner{width:32px;height:32px;border:3px solid #1e2035;border-top-color:#e8b86d;border-radius:50%;animation:spin 0.8s linear infinite;margin:0 auto 12px}
@keyframes spin{to{transform:rotate(360deg)}}
.loading{display:flex;flex-direction:column;align-items:center;justify-content:center;height:80vh}
.card{background:#12122a;border:1px solid #1e2035;border-radius:12px;padding:16px;margin-bottom:12px}
.tab-bar{display:flex;border-bottom:2px solid #1e2035;margin-bottom:16px}
.tab{flex:1;padding:10px 4px;font-size:13px;font-weight:600;border:none;background:transparent;cursor:pointer;color:#6b7280;border-bottom:2px solid transparent;margin-bottom:-2px}
.tab.on{color:#e8b86d;border-bottom-color:#e8b86d}
.page{display:none}.page.on{display:block}
.stat-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:8px}
.stat-box{background:#0d0d1a;border-radius:8px;padding:12px;text-align:center;border:1px solid #1e2035}
.stat-lbl{color:#6b7280;font-size:10px;margin-bottom:4px}
.stat-val{font-size:18px;font-weight:700}
.guest-row{background:#0d0d1a;border-radius:8px;padding:10px 12px;margin-bottom:6px}
.guest-top{display:flex;align-items:center;gap:8px}
.badge{font-size:11px;font-weight:700;padding:3px 8px;border-radius:4px;border:1px solid;flex-shrink:0}
.mode-bar{display:flex;gap:6px;margin-bottom:10px;flex-wrap:wrap}
.mbtn{background:transparent;border:1px solid #2d2d4e;border-radius:8px;color:#9ca3af;font-size:12px;padding:5px 12px;cursor:pointer;font-family:inherit}
.mbtn.on{background:#1e2035;border-color:rgba(232,184,109,0.3);color:#e8b86d;font-weight:700}
.chart-area{background:#12122a;border:1px solid #1e2035;border-radius:12px;padding:14px;overflow-x:auto}
.bar-wrap{display:flex;align-items:flex-end;gap:4px;height:160px;padding:0 4px}
.bar-col{display:flex;flex-direction:column;align-items:center;gap:4px;flex:1;min-width:24px}
.bar{border-radius:4px 4px 0 0;width:100%;background:#e8b86d;opacity:0.85;transition:height 0.3s}
.bar-lbl{font-size:9px;color:#6b7280;text-align:center;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;width:100%}
.bar-val{font-size:9px;color:#e8b86d;font-weight:700}
.progress-row{display:flex;align-items:center;gap:10px;padding:8px 0}
.progress-track{flex:1;background:#0d0d1a;border-radius:99px;height:5px;overflow:hidden}
.progress-fill{height:100%;border-radius:99px}
input[type=search]{background:#12122a;border:1px solid #2d2d4e;border-radius:8px;color:#e5e7eb;font-size:14px;padding:10px 14px 10px 38px;width:100%;outline:none;font-family:inherit}
.search-wrap{position:relative;margin-bottom:12px}
.search-icon{position:absolute;left:12px;top:50%;transform:translateY(-50%);color:#4b5563;font-size:14px;pointer-events:none}
</style>
</head>
<body>
<div style="position:fixed;top:12px;right:12px;z-index:100">
  <button onclick="location.reload()" style="background:#1e2035;border:1px solid #2d2d4e;border-radius:8px;color:#9ca3af;font-size:12px;padding:7px 12px;cursor:pointer;font-family:inherit">🔄 更新</button>
</div>
<div id="root" class="loading">
  <div class="spinner"></div>
  <div style="color:#e8b86d;font-size:14px;letter-spacing:2px">読み込み中...</div>
</div>

<script>
var params=new URLSearchParams(window.location.search);
var castId=params.get('id'),uid=params.get('uid');
var root=document.getElementById('root');

function yen(n){return n==null?'--':'¥'+Number(n).toLocaleString();}
function fmtDate(s){if(!s)return'';var p=s.split('-');return p[1]+'/'+p[2];}
function pad(n){return String(n).padStart(2,'0');}
function ts(t){
  if(t==='指名')return{bg:'rgba(232,184,109,.12)',c:'#e8b86d',b:'rgba(232,184,109,.3)'};
  if(t==='同伴')return{bg:'rgba(52,211,153,.12)',c:'#34d399',b:'rgba(52,211,153,.3)'};
  return{bg:'rgba(167,139,250,.12)',c:'#a78bfa',b:'rgba(167,139,250,.3)'};
}

if(!castId||!uid){root.innerHTML='<p style="color:#fca5a5;text-align:center;padding:40px">無効なURLです</p>';throw new Error();}

fetch('https://firestore.googleapis.com/v1/projects/cast-manager-b0ae2/databases/(default)/documents/users/'+uid+'/data/main')
.then(function(r){if(!r.ok)throw new Error('HTTP '+r.status);return r.json();})
.then(function(json){
  function pv(v){
    if(!v)return null;
    if(v.stringValue!==undefined)return v.stringValue;
    if(v.integerValue!==undefined)return Number(v.integerValue);
    if(v.doubleValue!==undefined)return Number(v.doubleValue);
    if(v.booleanValue!==undefined)return v.booleanValue;
    if(v.arrayValue)return(v.arrayValue.values||[]).map(pv);
    if(v.mapValue)return pm(v.mapValue.fields||{});
    return null;
  }
  function pm(f){var o={};Object.keys(f).forEach(function(k){o[k]=pv(f[k]);});return o;}
  var data=pm(json.fields||{});
  var cast=(data.casts||[]).find(function(c){return c.id===castId;});
  if(!cast){root.innerHTML='<p style="color:#fca5a5;text-align:center;padding:40px">キャストが見つかりません</p>';return;}
  var records=(data.records||{})[castId]||[];
  var customers=(data.customers||{})[castId]||[];
  render(cast,records,customers);
})
.catch(function(e){root.innerHTML='<p style="color:#fca5a5;text-align:center;padding:40px;white-space:pre-line">読み込みエラー\n'+e.message+'</p>';});

function getTarget(cast,mk){
  if(cast.monthlyTargets&&cast.monthlyTargets[mk]!=null)return Number(cast.monthlyTargets[mk]);return 0;
}

function render(cast,records,customers){
  var now=new Date(),tm=now.getFullYear()+'-'+pad(now.getMonth()+1);
  var thisRows=records.filter(function(r){return r.date&&r.date.slice(0,7)===tm;});
  var thisSales=thisRows.reduce(function(s,r){return s+Number(r.sales||0);},0);
  var thisNom=thisRows.reduce(function(s,r){return s+Number(r.nominations||0);},0);
  var thisComp=thisRows.reduce(function(s,r){return s+Number(r.companions||0);},0);
  var thisFloor=thisRows.reduce(function(s,r){return s+Number(r.floorCount||0);},0);

  // 月別データ
  function getMonthData(yr){
    var list=[];
    for(var mi=1;mi<=12;mi++){
      var mk=yr+'-'+pad(mi);
      var rows=records.filter(function(r){return r.date&&r.date.slice(0,7)===mk;});
      list.push({label:mi+'月',mk:mk,sales:rows.reduce(function(s,r){return s+Number(r.sales||0);},0),target:getTarget(cast,mk)});
    }return list;
  }
  // 年別データ
  function getYearData(){
    var ys=new Set();records.forEach(function(r){ys.add(r.date.slice(0,4));});
    ys.add(String(now.getFullYear()));
    return Array.from(ys).sort().map(function(yr){
      var rows=records.filter(function(r){return r.date.slice(0,4)===yr;});
      return{label:yr+'年',sales:rows.reduce(function(s,r){return s+Number(r.sales||0);},0)};
    });
  }
  function allYears(){
    var ys=new Set();records.forEach(function(r){ys.add(r.date.slice(0,4));});
    ys.add(String(now.getFullYear()));
    return Array.from(ys).sort(function(a,b){return b.localeCompare(a);});
  }

  // SVGバーチャート（ライブラリ不要）
  function buildChart(chartData,selYr,mode){
    var maxSales=Math.max.apply(null,chartData.map(function(d){return d.sales||0;}));
    if(maxSales===0)maxSales=1;
    var html='<div class="bar-wrap">';
    chartData.forEach(function(d){
      var h=Math.round((d.sales/maxSales)*140);
      var th=d.target>0?Math.round((d.target/maxSales)*140):0;
      html+='<div class="bar-col">';
      if(d.sales>0)html+='<div class="bar-val">'+( d.sales>=10000?Math.round(d.sales/10000)+'万':d.sales)+'</div>';
      html+='<div style="position:relative;width:100%;flex:1;display:flex;align-items:flex-end">';
      html+='<div class="bar" style="height:'+h+'px"></div>';
      if(th>0)html+='<div style="position:absolute;left:0;right:0;bottom:'+th+'px;height:2px;background:#34d399;opacity:0.8"></div>';
      html+='</div>';
      html+='<div class="bar-lbl">'+d.label+'</div>';
      html+='</div>';
    });
    html+='</div>';
    if(mode==='monthly'){
      html+='<div style="display:flex;align-items:center;gap:8px;margin-top:8px;font-size:11px;color:#6b7280">';
      html+='<div style="width:12px;height:8px;background:#e8b86d;border-radius:2px;flex-shrink:0"></div>売上';
      html+='<div style="width:16px;height:2px;background:#34d399;flex-shrink:0"></div>目標';
      html+='</div>';
    }
    return html;
  }

  var curYr=String(now.getFullYear());
  var years=allYears();
  var activeTab='summary';
  var activeMode='monthly';
  var activeYear=curYr;
  var searchQ='';

  function tabHTML(id,label){return '<button class="tab'+(activeTab===id?' on':'')+'" onclick="switchTab(\''+id+'\')" >'+label+'</button>';}
  function mbtnHTML(key,label,mode,active){return '<button class="mbtn'+(active?' on':'')+'" onclick="'+mode+'(\''+key+'\')" >'+label+'</button>';}

  function renderSummary(){
    var html='<div id="pSummary" class="page'+(activeTab==='summary'?' on':'')+'">';
    html+='<div class="card"><div style="color:#e8b86d;font-weight:700;font-size:14px;margin-bottom:12px">今月の実績</div>';
    html+='<div class="stat-grid">';
    [['売上',yen(thisSales),'#e8b86d'],['出勤日数',thisRows.length+'日','#fb923c'],['指名組数',thisNom+'組','#34d399'],['同伴回数',thisComp+'回','#a78bfa'],['場内組数',thisFloor+'組','#60a5fa']].forEach(function(item){
      html+='<div class="stat-box"><div class="stat-lbl">'+item[0]+'</div><div class="stat-val" style="color:'+item[2]+'">'+item[1]+'</div></div>';
    });
    html+='</div></div>';
    html+='<div class="card"><div style="color:#e8b86d;font-weight:700;font-size:14px;margin-bottom:12px">直近6ヶ月</div>';
    for(var i=0;i<6;i++){
      var d=new Date(now.getFullYear(),now.getMonth()-i,1);
      var mk=d.getFullYear()+'-'+pad(d.getMonth()+1);
      var rows=records.filter(function(r){return r.date&&r.date.slice(0,7)===mk;});
      var sales=rows.reduce(function(s,r){return s+Number(r.sales||0);},0);
      var tgt=getTarget(cast,mk);
      var pct=tgt>0?Math.min(100,Math.round(sales/tgt*100)):null;
      var pctColor=pct===null?'#9ca3af':pct>=100?'#34d399':pct>=70?'#fbbf24':'#9ca3af';
      var barColor=pct===null?'#e8b86d':pct>=100?'#34d399':pct>=70?'#fbbf24':'#e8b86d';
      html+='<div class="progress-row" style="'+(i<5?'border-bottom:1px solid #1e2035':'')+'">';
      html+='<div style="color:'+(mk===tm?'#e8b86d':'#9ca3af')+';font-size:13px;font-weight:'+(mk===tm?'700':'400')+';min-width:40px">'+(d.getMonth()+1)+'月</div>';
      html+='<div style="flex:1"><div style="display:flex;justify-content:space-between;margin-bottom:'+(tgt>0?'4px':'0')+'"><span style="color:#e8b86d;font-weight:700">'+yen(sales)+'</span>'+(pct!==null?'<span style="color:'+pctColor+';font-size:12px">'+pct+'%</span>':'')+'</div>';
      if(tgt>0)html+='<div class="progress-track"><div class="progress-fill" style="background:'+barColor+';width:'+(pct||0)+'%"></div></div>';
      html+='</div></div>';
    }
    html+='</div></div>';
    return html;
  }

  function renderChart(){
    var html='<div id="pChart" class="page'+(activeTab==='chart'?' on':'')+'">';
    html+='<div class="mode-bar">';
    html+=mbtnHTML('monthly','月別','switchMode',activeMode==='monthly');
    html+=mbtnHTML('yearly','年別','switchMode',activeMode==='yearly');
    html+='</div>';
    if(activeMode==='monthly'){
      html+='<div class="mode-bar" style="margin-bottom:12px">';
      years.forEach(function(y){html+=mbtnHTML(y,y+'年','switchYear',activeYear===y);});
      html+='</div>';
    }
    html+='<div class="chart-area">';
    var chartData=activeMode==='monthly'?getMonthData(activeYear):getYearData();
    html+=buildChart(chartData,activeYear,activeMode);
    html+='</div></div>';
    return html;
  }

  function renderCustomers(){
    var q=searchQ.toLowerCase();
    var list=q?customers.filter(function(c){return[c.name,c.type,c.bottleNeck,c.note,fmtDate(c.date)].join(' ').toLowerCase().includes(q);}):customers;
    var html='<div id="pCustomers" class="page'+(activeTab==='customers'?' on':'')+'">';
    html+='<div class="search-wrap"><span class="search-icon">🔍</span><input type="search" placeholder="名前・種別・日付で検索..." value="'+searchQ.replace(/"/g,'&quot;')+'" oninput="onSearch(this.value)" /></div>';
    html+='<div style="color:#6b7280;font-size:12px;margin-bottom:8px">'+list.length+'件</div>';
    if(list.length===0){html+='<div style="text-align:center;padding:40px;color:#4b5563">顧客データがありません</div>';}
    else list.forEach(function(c){
      var t=ts(c.type);
      html+='<div class="guest-row"><div class="guest-top">';
      html+='<span class="badge" style="background:'+t.bg+';color:'+t.c+';border-color:'+t.b+'">'+c.type+'</span>';
      html+='<span style="font-weight:700;color:#f3f4f6;flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">'+c.name+'</span>';
      html+='<span style="color:#6b7280;font-size:11px;flex-shrink:0">'+fmtDate(c.date)+'</span>';
      if(c.sales>0)html+='<span style="color:#e8b86d;font-size:13px;font-weight:700;flex-shrink:0">'+yen(c.sales)+'</span>';
      html+='</div>';
      var extras=[];
      if(c.bottleNeck)extras.push('🍾 '+c.bottleNeck);
      if(c.orderBottle)extras.push('🥂 '+c.orderBottle);
      if(c.note)extras.push(c.note);
      if(extras.length)html+='<div style="font-size:12px;color:#9ca3af;margin-top:6px;display:flex;gap:8px;flex-wrap:wrap">'+extras.map(function(x){return'<span>'+x+'</span>';}).join('')+'</div>';
      html+='</div>';
    });
    html+='</div>';
    return html;
  }

  function fullRender(){
    var html='';
    html+='<div style="text-align:center;padding:20px 0 16px;border-bottom:1px solid #1e2035;margin-bottom:16px">';
    html+='<div style="color:#e8b86d;font-size:13px;font-weight:700;letter-spacing:3px;margin-bottom:8px">✦ CAST MANAGER</div>';
    html+='<div style="color:#f3f4f6;font-size:26px;font-weight:700">'+cast.name+'</div>';
    html+='<div style="color:#6b7280;font-size:12px;margin-top:6px">'+(now.getMonth()+1)+'月のデータ</div>';
    html+='</div>';
    html+='<div class="tab-bar">';
    html+=tabHTML('summary','📊 サマリー');
    html+=tabHTML('chart','📈 グラフ');
    html+=tabHTML('customers','👥 顧客');
    html+='</div>';
    html+=renderSummary();
    html+=renderChart();
    html+=renderCustomers();
    root.className='';
    root.innerHTML=html;
  }

  window.switchTab=function(id){activeTab=id;fullRender();};
  window.switchMode=function(m){activeMode=m;fullRender();};
  window.switchYear=function(y){activeYear=y;fullRender();};
  window.onSearch=function(q){searchQ=q;renderCustomersOnly();};
  window.toggleCust=function(id){
    var el=document.getElementById(id);
    var arrow=document.getElementById(id+'_arrow');
    if(!el)return;
    var open=el.style.display==='block';
    el.style.display=open?'none':'block';
    if(arrow)arrow.textContent=open?'▼':'▲';
  };

  function renderCustomersOnly(){
    var el=document.getElementById('pCustomers');
    if(el){
      var q=searchQ.toLowerCase();
      var list=q?customers.filter(function(c){return[c.name,c.type,c.bottleNeck,c.note,fmtDate(c.date)].join(' ').toLowerCase().includes(q);}):customers;
      var html='<div class="search-wrap"><span class="search-icon">🔍</span><input type="search" placeholder="名前・種別・日付で検索..." value="'+searchQ.replace(/"/g,'&quot;')+'" oninput="onSearch(this.value)" /></div>';
      html+='<div style="color:#6b7280;font-size:12px;margin-bottom:8px">'+list.length+'件</div>';
      if(list.length===0){html+='<div style="text-align:center;padding:40px;color:#4b5563">該当なし</div>';}
      else list.forEach(function(c){
        var t=ts(c.type);
        html+='<div class="guest-row"><div class="guest-top">';
        html+='<span class="badge" style="background:'+t.bg+';color:'+t.c+';border-color:'+t.b+'">'+c.type+'</span>';
        html+='<span style="font-weight:700;color:#f3f4f6;flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">'+c.name+'</span>';
        html+='<span style="color:#6b7280;font-size:11px;flex-shrink:0">'+fmtDate(c.date)+'</span>';
        if(c.sales>0)html+='<span style="color:#e8b86d;font-size:13px;font-weight:700;flex-shrink:0">'+yen(c.sales)+'</span>';
        html+='</div>';
        var extras=[];
        if(c.bottleNeck)extras.push('🍾 '+c.bottleNeck);
        if(c.orderBottle)extras.push('🥂 '+c.orderBottle);
        if(c.note)extras.push(c.note);
        if(extras.length)html+='<div style="font-size:12px;color:#9ca3af;margin-top:6px;display:flex;gap:8px;flex-wrap:wrap">'+extras.map(function(x){return'<span>'+x+'</span>';}).join('')+'</div>';
        html+='</div>';
      });
      el.innerHTML=html;
    }
  }

  fullRender();
}
</script>
</body>
</html>
