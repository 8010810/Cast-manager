<!doctype html>
<html lang="ja">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0,user-scalable=no"/>
<title>CAST VIEWER</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700&display=swap" rel="stylesheet"/>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#0d0d1a;color:#e5e7eb;font-family:'Noto Sans JP','Hiragino Sans',sans-serif;min-height:100vh;padding:0}
.spinner{width:32px;height:32px;border:3px solid #1e2035;border-top-color:#e8b86d;border-radius:50%;animation:spin 0.8s linear infinite;margin:0 auto 12px}
@keyframes spin{to{transform:rotate(360deg)}}
#loading{display:flex;flex-direction:column;align-items:center;justify-content:center;height:100vh;color:#e8b86d;font-size:14px;letter-spacing:2px}
#app{display:none;max-width:600px;margin:0 auto;padding:16px}
.hd{text-align:center;padding:20px 0 16px;border-bottom:1px solid #1e2035;margin-bottom:16px;position:relative}
.refresh-btn{position:absolute;top:0;right:0;background:#1e2035;border:1px solid #2d2d4e;border-radius:8px;color:#9ca3af;font-size:11px;padding:6px 10px;cursor:pointer;font-family:inherit}
.tab-bar{display:flex;border-bottom:2px solid #1e2035;margin-bottom:16px}
.tab-btn{flex:1;padding:10px 4px;font-size:13px;font-weight:600;border:none;background:transparent;cursor:pointer;color:#6b7280;border-bottom:2px solid transparent;margin-bottom:-2px;font-family:inherit}
.tab-btn.on{color:#e8b86d;border-bottom-color:#e8b86d}
.pane{display:none}.pane.on{display:block}
.card{background:#12122a;border:1px solid #1e2035;border-radius:12px;padding:16px;margin-bottom:12px}
.stat-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:8px}
.stat-box{background:#0d0d1a;border-radius:8px;padding:12px;text-align:center;border:1px solid #1e2035}
.stat-lbl{color:#6b7280;font-size:10px;margin-bottom:4px}
.stat-val{font-size:18px;font-weight:700}
.month-row{display:flex;align-items:center;gap:10px;padding:8px 0}
.prog-track{flex:1;background:#0d0d1a;border-radius:99px;height:5px;overflow:hidden}
.prog-fill{height:100%;border-radius:99px}
/* グラフ */
.chart-outer{background:#12122a;border:1px solid #1e2035;border-radius:12px;padding:12px;margin-bottom:12px;overflow-x:auto;-webkit-overflow-scrolling:touch}
.bars{display:flex;align-items:flex-end;gap:3px;height:140px;min-width:360px}
.bar-col{display:flex;flex-direction:column;align-items:center;gap:2px;flex:1;min-width:22px}
.bar-bg{flex:1;width:100%;display:flex;flex-direction:column;justify-content:flex-end;position:relative}
.bar-fill{background:#e8b86d;opacity:0.9;border-radius:4px 4px 0 0;width:100%;transition:height 0.3s}
.bar-target{position:absolute;left:0;right:0;height:2px;background:#34d399;opacity:0.9}
.bar-lbl{font-size:9px;color:#6b7280;text-align:center;width:100%;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.bar-val{font-size:8px;color:#e8b86d;font-weight:700;text-align:center}
.chart-legend{display:flex;align-items:center;gap:12px;margin-top:8px;font-size:11px;color:#6b7280}
.legend-bar{width:12px;height:8px;background:#e8b86d;border-radius:2px}
.legend-line{width:16px;height:2px;background:#34d399}
/* 顧客 */
.search-box{position:relative;margin-bottom:12px}
.search-box input{background:#12122a;border:1px solid #2d2d4e;border-radius:8px;color:#e5e7eb;font-size:14px;padding:10px 14px 10px 38px;width:100%;outline:none;font-family:inherit;-webkit-appearance:none}
.search-icon{position:absolute;left:12px;top:50%;transform:translateY(-50%);color:#4b5563;font-size:14px;pointer-events:none}
.cust-item{background:#12122a;border:1px solid #1e2035;border-radius:10px;margin-bottom:6px;overflow:hidden}
.cust-header{display:flex;align-items:center;gap:8px;padding:12px 14px;cursor:pointer;-webkit-tap-highlight-color:transparent}
.badge{font-size:11px;font-weight:700;padding:3px 8px;border-radius:4px;border:1px solid;flex-shrink:0}
.cust-detail{display:none;padding:12px 14px;border-top:1px solid #1e2035}
.cust-detail.open{display:block}
.detail-row{display:flex;gap:8px;margin-bottom:6px;font-size:13px}
.detail-lbl{color:#6b7280;min-width:100px;flex-shrink:0}
.detail-val{color:#e5e7eb;word-break:break-word}
.mode-bar{display:flex;gap:6px;margin-bottom:10px;flex-wrap:wrap}
.mbtn{background:transparent;border:1px solid #2d2d4e;border-radius:8px;color:#9ca3af;font-size:12px;padding:5px 12px;cursor:pointer;font-family:inherit}
.mbtn.on{background:#1e2035;border-color:rgba(232,184,109,0.3);color:#e8b86d;font-weight:700}
</style>
</head>
<body>
<div id="loading"><div class="spinner"></div>読み込み中...</div>
<div id="app"></div>

<script>
var params=new URLSearchParams(window.location.search);
var castId=params.get('id'),uid=params.get('uid');

function yen(n){return n==null?'--':'¥'+Number(n).toLocaleString();}
function fmtDate(s){if(!s)return'';var p=s.split('-');return p[1]+'/'+p[2];}
function pad(n){return String(n).padStart(2,'0');}
function ts(t){
  if(t==='指名')return{bg:'rgba(232,184,109,.12)',c:'#e8b86d',b:'rgba(232,184,109,.3)'};
  if(t==='同伴')return{bg:'rgba(52,211,153,.12)',c:'#34d399',b:'rgba(52,211,153,.3)'};
  return{bg:'rgba(167,139,250,.12)',c:'#a78bfa',b:'rgba(167,139,250,.3)'};
}

if(!castId||!uid){
  document.getElementById('loading').innerHTML='<p style="color:#fca5a5">無効なURLです</p>';
}else{
  fetch('https://firestore.googleapis.com/v1/projects/cast-manager-b0ae2/databases/(default)/documents/users/'+uid+'/data/main')
  .then(function(r){if(!r.ok)throw new Error('HTTP '+r.status);return r.json();})
  .then(function(json){
    function pv(v){
      if(!v)return null;
      if(v.stringValue!==undefined)return v.stringValue;
      if(v.integerValue!==undefined)return Number(v.integerValue);
      if(v.doubleValue!==undefined)return Number(v.doubleValue);
      if(v.booleanValue!==undefined)return v.booleanValue;
      if(v.arrayValue)return(v.arrayValue.values||[]).map(pv);
      if(v.mapValue)return pm(v.mapValue.fields||{});
      return null;
    }
    function pm(f){var o={};Object.keys(f).forEach(function(k){o[k]=pv(f[k]);});return o;}
    var data=pm(json.fields||{});
    var cast=(data.casts||[]).find(function(c){return c.id===castId;});
    if(!cast){document.getElementById('loading').innerHTML='<p style="color:#fca5a5">キャストが見つかりません</p>';return;}
    init(cast,(data.records||{})[castId]||[],(data.customers||{})[castId]||[]);
  })
  .catch(function(e){document.getElementById('loading').innerHTML='<p style="color:#fca5a5;padding:20px;text-align:center">読み込みエラー<br>'+e.message+'</p>';});
}

// ─── グローバル状態 ────────────────────────────────────────────────────────
var G={cast:null,records:[],customers:[],tab:'summary',chartMode:'monthly',chartYear:String(new Date().getFullYear()),query:''};

function getTarget(mk){var mt=G.cast.monthlyTargets;return mt&&mt[mk]!=null?Number(mt[mk]):0;}

function init(cast,records,customers){
  G.cast=cast;G.records=records;G.customers=customers;
  document.getElementById('loading').style.display='none';
  document.getElementById('app').style.display='block';
  render();
}

function render(){
  var app=document.getElementById('app');
  var now=new Date();
  var tm=now.getFullYear()+'-'+pad(now.getMonth()+1);

  // ── ヘッダー ──
  var html='<div class="hd">';
  html+='<button class="refresh-btn" onclick="location.reload()">🔄 更新</button>';
  html+='<div style="color:#e8b86d;font-size:13px;font-weight:700;letter-spacing:3px;margin-bottom:8px">✦ CAST MANAGER</div>';
  html+='<div style="color:#f3f4f6;font-size:24px;font-weight:700">'+G.cast.name+'</div>';
  html+='<div style="color:#6b7280;font-size:12px;margin-top:6px">'+(now.getMonth()+1)+'月のデータ</div>';
  html+='</div>';

  // ── タブ ──
  html+='<div class="tab-bar">';
  [['summary','📊 サマリー'],['chart','📈 グラフ'],['customers','👥 顧客']].forEach(function(t){
    html+='<button class="tab-btn'+(G.tab===t[0]?' on':'')+'" onclick="switchTab(\''+t[0]+'\')" >'+t[1]+'</button>';
  });
  html+='</div>';

  // ── サマリー ──
  html+='<div class="pane'+(G.tab==='summary'?' on':'')+'">';
  var thisRows=G.records.filter(function(r){return r.date&&r.date.slice(0,7)===tm;});
  var thisSales=thisRows.reduce(function(s,r){return s+Number(r.sales||0);},0);
  var thisNom=thisRows.reduce(function(s,r){return s+Number(r.nominations||0);},0);
  var thisComp=thisRows.reduce(function(s,r){return s+Number(r.companions||0);},0);
  var thisFloor=thisRows.reduce(function(s,r){return s+Number(r.floorCount||0);},0);
  html+='<div class="card"><div style="color:#e8b86d;font-weight:700;font-size:14px;margin-bottom:12px">今月の実績</div>';
  html+='<div class="stat-grid">';
  [['売上',yen(thisSales),'#e8b86d'],['出勤日数',thisRows.length+'日','#fb923c'],['指名組数',thisNom+'組','#34d399'],['同伴回数',thisComp+'回','#a78bfa'],['場内組数',thisFloor+'組','#60a5fa']].forEach(function(item){
    html+='<div class="stat-box"><div class="stat-lbl">'+item[0]+'</div><div class="stat-val" style="color:'+item[2]+'">'+item[1]+'</div></div>';
  });
  html+='</div></div>';
  html+='<div class="card"><div style="color:#e8b86d;font-weight:700;font-size:14px;margin-bottom:12px">直近6ヶ月</div>';
  for(var i=0;i<6;i++){
    var d=new Date(now.getFullYear(),now.getMonth()-i,1);
    var mk=d.getFullYear()+'-'+pad(d.getMonth()+1);
    var rows=G.records.filter(function(r){return r.date&&r.date.slice(0,7)===mk;});
    var sales=rows.reduce(function(s,r){return s+Number(r.sales||0);},0);
    var tgt=getTarget(mk);
    var pct=tgt>0?Math.min(100,Math.round(sales/tgt*100)):null;
    var pctColor=pct===null?'#9ca3af':pct>=100?'#34d399':pct>=70?'#fbbf24':'#9ca3af';
    var barColor=pct===null?'#e8b86d':pct>=100?'#34d399':pct>=70?'#fbbf24':'#e8b86d';
    html+='<div class="month-row" style="'+(i<5?'border-bottom:1px solid #1e2035':'')+'">';
    html+='<div style="color:'+(mk===tm?'#e8b86d':'#9ca3af')+';font-size:13px;font-weight:'+(mk===tm?700:400)+';min-width:40px">'+(d.getMonth()+1)+'月</div>';
    html+='<div style="flex:1"><div style="display:flex;justify-content:space-between;margin-bottom:'+(tgt>0?'4px':'0')+'">';
    html+='<span style="color:#e8b86d;font-weight:700">'+yen(sales)+'</span>';
    if(pct!==null)html+='<span style="color:'+pctColor+';font-size:12px">'+pct+'%</span>';
    html+='</div>';
    if(tgt>0)html+='<div class="prog-track"><div class="prog-fill" style="background:'+barColor+';width:'+(pct||0)+'%"></div></div>';
    html+='</div></div>';
  }
  html+='</div></div>';

  // ── グラフ ──
  var allYears=(function(){var ys=new Set();G.records.forEach(function(r){ys.add(r.date.slice(0,4));});ys.add(String(now.getFullYear()));return Array.from(ys).sort(function(a,b){return b.localeCompare(a);});})();
  html+='<div class="pane'+(G.tab==='chart'?' on':'')+'">';
  html+='<div class="mode-bar">';
  html+='<button class="mbtn'+(G.chartMode==='monthly'?' on':'')+'" onclick="setChartMode(\'monthly\')">月別</button>';
  html+='<button class="mbtn'+(G.chartMode==='yearly'?' on':'')+'" onclick="setChartMode(\'yearly\')">年別</button>';
  html+='</div>';
  if(G.chartMode==='monthly'){
    html+='<div class="mode-bar">';
    allYears.forEach(function(y){html+='<button class="mbtn'+(G.chartYear===y?' on':'')+'" onclick="setChartYear(\''+y+'\')">'+y+'年</button>';});
    html+='</div>';
  }
  // バーチャート生成
  var chartData=[];
  if(G.chartMode==='monthly'){
    for(var mi=1;mi<=12;mi++){
      var cmk=G.chartYear+'-'+pad(mi);
      var crows=G.records.filter(function(r){return r.date&&r.date.slice(0,7)===cmk;});
      chartData.push({label:mi+'月',sales:crows.reduce(function(s,r){return s+Number(r.sales||0);},0),target:getTarget(cmk)});
    }
  }else{
    allYears.slice().reverse().forEach(function(yr){
      var crows=G.records.filter(function(r){return r.date&&r.date.slice(0,4)===yr;});
      chartData.push({label:yr+'年',sales:crows.reduce(function(s,r){return s+Number(r.sales||0);},0),target:0});
    });
  }
  var maxSales=Math.max.apply(null,chartData.map(function(d){return d.sales;}));
  var maxVal=Math.max(maxSales,1);
  html+='<div class="chart-outer"><div class="bars">';
  chartData.forEach(function(d){
    var h=Math.round((d.sales/maxVal)*120);
    var th=d.target>0?Math.round((d.target/maxVal)*120):0;
    var valLabel=d.sales>=10000?Math.round(d.sales/10000)+'万':d.sales>0?d.sales:'';
    html+='<div class="bar-col">';
    if(valLabel)html+='<div class="bar-val">'+valLabel+'</div>';
    html+='<div class="bar-bg">';
    html+='<div class="bar-fill" style="height:'+h+'px"></div>';
    if(th>0)html+='<div class="bar-target" style="bottom:'+th+'px"></div>';
    html+='</div>';
    html+='<div class="bar-lbl">'+d.label+'</div>';
    html+='</div>';
  });
  html+='</div>';
  html+='<div class="chart-legend"><div class="legend-bar"></div>売上';
  if(G.chartMode==='monthly')html+='<div class="legend-line" style="margin-left:8px"></div>目標';
  html+='</div></div></div>';

  // ── 顧客 ──
  html+='<div class="pane'+(G.tab==='customers'?' on':'')+'">';
  html+='<div class="search-box"><span class="search-icon">🔍</span>';
  html+='<input id="custSearch" type="search" placeholder="名前・種別・日付で検索..." value="'+G.query.replace(/"/g,'&quot;')+'" /></div>';
  var q=G.query.toLowerCase();
  var list=q?G.customers.filter(function(c){return[c.name,c.type,c.bottleNeck,c.note,fmtDate(c.date)].join(' ').toLowerCase().includes(q);}):G.customers;
  html+='<div style="color:#6b7280;font-size:12px;margin-bottom:8px">'+list.length+'件</div>';
  if(list.length===0){
    html+='<div style="text-align:center;padding:40px;color:#4b5563">顧客データがありません</div>';
  }else{
    list.forEach(function(c,ci){
      var t=ts(c.type);
      html+='<div class="cust-item">';
      html+='<div class="cust-header" onclick="toggleDetail('+ci+')">';
      html+='<span class="badge" style="background:'+t.bg+';color:'+t.c+';border-color:'+t.b+'">'+c.type+'</span>';
      html+='<span style="font-weight:700;color:#f3f4f6;flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;font-size:14px">'+c.name+'</span>';
      html+='<span style="color:#6b7280;font-size:11px;flex-shrink:0">'+fmtDate(c.date)+'</span>';
      if(c.sales>0)html+='<span style="color:#e8b86d;font-size:13px;font-weight:700;flex-shrink:0;margin-left:6px">'+yen(c.sales)+'</span>';
      html+='<span id="arr'+ci+'" style="color:#4b5563;font-size:11px;margin-left:6px">▼</span>';
      html+='</div>';
      html+='<div id="det'+ci+'" class="cust-detail">';
      [['種別',c.type],['売上',c.sales>0?yen(c.sales):'--'],['ボトルネック',c.bottleNeck||'--'],['オーダーボトル',c.orderBottle||'--'],['領収書',c.receipt||'--'],['備考',c.note||'--']].forEach(function(row){
        html+='<div class="detail-row"><span class="detail-lbl">'+row[0]+'</span><span class="detail-val">'+row[1]+'</span></div>';
      });
      html+='</div></div>';
    });
  }
  html+='</div>';

  app.innerHTML=html;

  // 検索イベントは innerHTML 後にバインド（キーボードが閉じない）
  var si=document.getElementById('custSearch');
  if(si){
    si.addEventListener('input',function(){
      G.query=this.value;
      // 顧客リストだけ更新（inputは維持）
      renderCustomers();
    });
    // フォーカスを維持
    if(G.tab==='customers'&&G.query){
      si.focus();
      si.setSelectionRange(si.value.length,si.value.length);
    }
  }
}

function renderCustomers(){
  var q=G.query.toLowerCase();
  var list=q?G.customers.filter(function(c){return[c.name,c.type,c.bottleNeck,c.note,fmtDate(c.date)].join(' ').toLowerCase().includes(q);}):G.customers;
  var html='<div style="color:#6b7280;font-size:12px;margin-bottom:8px">'+list.length+'件</div>';
  if(list.length===0){
    html+='<div style="text-align:center;padding:40px;color:#4b5563">顧客データがありません</div>';
  }else{
    list.forEach(function(c,ci){
      var t=ts(c.type);
      html+='<div class="cust-item">';
      html+='<div class="cust-header" onclick="toggleDetail('+ci+')">';
      html+='<span class="badge" style="background:'+t.bg+';color:'+t.c+';border-color:'+t.b+'">'+c.type+'</span>';
      html+='<span style="font-weight:700;color:#f3f4f6;flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;font-size:14px">'+c.name+'</span>';
      html+='<span style="color:#6b7280;font-size:11px;flex-shrink:0">'+fmtDate(c.date)+'</span>';
      if(c.sales>0)html+='<span style="color:#e8b86d;font-size:13px;font-weight:700;flex-shrink:0;margin-left:6px">'+yen(c.sales)+'</span>';
      html+='<span id="arr'+ci+'" style="color:#4b5563;font-size:11px;margin-left:6px">▼</span>';
      html+='</div>';
      html+='<div id="det'+ci+'" class="cust-detail">';
      [['種別',c.type],['売上',c.sales>0?yen(c.sales):'--'],['ボトルネック',c.bottleNeck||'--'],['オーダーボトル',c.orderBottle||'--'],['領収書',c.receipt||'--'],['備考',c.note||'--']].forEach(function(row){
        html+='<div class="detail-row"><span class="detail-lbl">'+row[0]+'</span><span class="detail-val">'+row[1]+'</span></div>';
      });
      html+='</div></div>';
    });
  }
  // 顧客ペインの検索ボックス以下だけ更新
  var pane=document.querySelector('.pane.on');
  if(pane){
    var countDiv=pane.querySelector('div[style*="6b7280"]');
    if(countDiv){
      // searchboxの次の兄弟要素以降を置き換え
      var sb=pane.querySelector('.search-box');
      if(sb){
        // sb以降の全要素を削除して新しいHTMLを挿入
        var next=sb.nextSibling;
        while(next){var tmp=next.nextSibling;pane.removeChild(next);next=tmp;}
        var div=document.createElement('div');
        div.innerHTML=html;
        while(div.firstChild)pane.appendChild(div.firstChild);
      }
    }
  }
}

window.switchTab=function(t){G.tab=t;G.query='';render();};
window.setChartMode=function(m){G.chartMode=m;render();};
window.setChartYear=function(y){G.chartYear=y;render();};
window.toggleDetail=function(i){
  var det=document.getElementById('det'+i);
  var arr=document.getElementById('arr'+i);
  if(!det)return;
  var open=det.classList.contains('open');
  det.classList.toggle('open',!open);
  if(arr)arr.textContent=open?'▼':'▲';
};
</script>
</body>
</html>
