<!doctype html>
<html lang="ja">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>CAST VIEWER</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#0d0d1a;color:#e5e7eb;font-family:'Hiragino Sans',sans-serif;min-height:100vh;padding:16px;max-width:600px;margin:0 auto}
.loading{display:flex;align-items:center;justify-content:center;height:80vh;color:#e8b86d;font-size:14px;letter-spacing:2px;flex-direction:column;gap:12px}
.spinner{width:32px;height:32px;border:3px solid #1e2035;border-top-color:#e8b86d;border-radius:50%;animation:spin 0.8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.header{text-align:center;padding:24px 0 20px;border-bottom:1px solid #1e2035;margin-bottom:20px}
.logo{color:#e8b86d;font-size:16px;font-weight:700;letter-spacing:3px;margin-bottom:8px}
.cast-name{color:#f3f4f6;font-size:24px;font-weight:700}
.card{background:#12122a;border:1px solid #1e2035;border-radius:12px;padding:16px;margin-bottom:12px}
.section-title{color:#e8b86d;font-weight:700;font-size:14px;margin-bottom:12px}
.stats-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:8px}
.stat-cell{background:#0d0d1a;border-radius:8px;padding:12px;text-align:center;border:1px solid #1e2035}
.stat-label{color:#6b7280;font-size:10px;margin-bottom:4px}
.stat-value{font-size:18px;font-weight:700}
.guest-row{display:flex;align-items:center;gap:8px;padding:10px 12px;background:#0d0d1a;border-radius:8px;margin-bottom:6px}
.badge{font-size:11px;font-weight:700;padding:3px 8px;border-radius:4px;border:1px solid;flex-shrink:0;white-space:nowrap}
.guest-name{font-weight:700;flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.guest-date{color:#6b7280;font-size:11px;flex-shrink:0}
.guest-sales{color:#e8b86d;font-size:12px;font-weight:700;flex-shrink:0}
.error{text-align:center;padding:60px 20px;color:#fca5a5;font-size:14px}
.error-icon{font-size:48px;margin-bottom:16px}
</style>
</head>
<body>
<div id="root">
  <div class="loading">
    <div class="spinner"></div>
    <div>読み込み中...</div>
  </div>
</div>

<script>
var params=new URLSearchParams(window.location.search);
var castId=params.get('id');
var uid=params.get('uid');

function yen(n){return n==null?'--':'¥'+Number(n).toLocaleString();}
function fmtDate(s){if(!s)return'';var p=s.split('-');return p[1]+'/'+p[2];}
function pad(n){return String(n).padStart(2,'0');}

function typeStyle(t){
  if(t==='指名')return{bg:'rgba(232,184,109,0.1)',color:'#e8b86d',border:'rgba(232,184,109,0.3)'};
  if(t==='同伴')return{bg:'rgba(52,211,153,0.1)',color:'#34d399',border:'rgba(52,211,153,0.3)'};
  return{bg:'rgba(167,139,250,0.1)',color:'#a78bfa',border:'rgba(167,139,250,0.3)'};
}

function showError(msg){
  document.getElementById('root').innerHTML='<div class="error"><div class="error-icon">⚠️</div><div>'+msg+'</div></div>';
}

if(!castId||!uid){
  showError('無効なURLです');
} else {
  // Firebase REST APIを使用（認証不要でFirestoreルールが許可している場合）
  var projectId='cast-manager-b0ae2';
  var url='https://firestore.googleapis.com/v1/projects/'+projectId+'/databases/(default)/documents/users/'+uid+'/data/main';

  fetch(url)
    .then(function(r){
      if(!r.ok)throw new Error('HTTP '+r.status);
      return r.json();
    })
    .then(function(json){
      // Firestore REST APIのレスポンスをパース
      function parseValue(v){
        if(!v)return null;
        if(v.stringValue!==undefined)return v.stringValue;
        if(v.integerValue!==undefined)return Number(v.integerValue);
        if(v.doubleValue!==undefined)return Number(v.doubleValue);
        if(v.booleanValue!==undefined)return v.booleanValue;
        if(v.arrayValue)return(v.arrayValue.values||[]).map(parseValue);
        if(v.mapValue)return parseMap(v.mapValue.fields||{});
        return null;
      }
      function parseMap(fields){
        var obj={};
        Object.keys(fields).forEach(function(k){obj[k]=parseValue(fields[k]);});
        return obj;
      }
      var data=parseMap(json.fields||{});

      var casts=data.casts||[];
      var cast=casts.find(function(c){return c.id===castId;});
      if(!cast){showError('キャストが見つかりません');return;}

      var records=(data.records||{})[castId]||[];
      var customers=(data.customers||{})[castId]||[];

      var now=new Date();
      var tm=now.getFullYear()+'-'+pad(now.getMonth()+1);
      var thisRows=records.filter(function(r){return r.date&&r.date.slice(0,7)===tm;});
      var thisSales=thisRows.reduce(function(s,r){return s+Number(r.sales||0);},0);
      var thisNominations=thisRows.reduce(function(s,r){return s+Number(r.nominations||0);},0);
      var thisCompanions=thisRows.reduce(function(s,r){return s+Number(r.companions||0);},0);
      var recentCust=customers.slice(0,30);

      var html='';
      html+='<div class="header">';
      html+='<div class="logo">✦ CAST MANAGER</div>';
      html+='<div class="cast-name">'+cast.name+'</div>';
      html+='<div style="color:#6b7280;font-size:12px;margin-top:6px">'+(now.getMonth()+1)+'月のデータ</div>';
      html+='</div>';

      html+='<div class="card">';
      html+='<div class="section-title">📊 今月の実績</div>';
      html+='<div class="stats-grid">';
      html+='<div class="stat-cell"><div class="stat-label">売上</div><div class="stat-value" style="color:#e8b86d">'+yen(thisSales)+'</div></div>';
      html+='<div class="stat-cell"><div class="stat-label">出勤日数</div><div class="stat-value" style="color:#fb923c">'+thisRows.length+'日</div></div>';
      html+='<div class="stat-cell"><div class="stat-label">指名組数</div><div class="stat-value" style="color:#34d399">'+thisNominations+'組</div></div>';
      html+='<div class="stat-cell"><div class="stat-label">同伴回数</div><div class="stat-value" style="color:#a78bfa">'+thisCompanions+'回</div></div>';
      html+='</div></div>';

      if(recentCust.length>0){
        html+='<div class="card">';
        html+='<div class="section-title">👥 来店顧客（直近'+recentCust.length+'件）</div>';
        recentCust.forEach(function(c){
          var ts=typeStyle(c.type);
          html+='<div class="guest-row">';
          html+='<span class="badge" style="background:'+ts.bg+';color:'+ts.color+';border-color:'+ts.border+'">'+c.type+'</span>';
          html+='<span class="guest-name">'+c.name+'</span>';
          html+='<span class="guest-date">'+fmtDate(c.date)+'</span>';
          if(c.sales>0)html+='<span class="guest-sales">'+yen(c.sales)+'</span>';
          html+='</div>';
        });
        html+='</div>';
      }

      document.getElementById('root').innerHTML=html;
    })
    .catch(function(err){
      console.error(err);
      showError('データの読み込みに失敗しました。\nFirebaseのセキュリティルールを確認してください。\n\n'+err.message);
    });
}
</script>
</body>
</html>
