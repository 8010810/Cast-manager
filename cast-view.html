<!doctype html>
<html lang="ja">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>CAST VIEWER</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#0d0d1a;color:#e5e7eb;font-family:'Hiragino Sans','Noto Sans JP',sans-serif;min-height:100vh}
#loading{display:flex;flex-direction:column;align-items:center;justify-content:center;height:100vh;color:#e8b86d;gap:12px}
.sp{width:32px;height:32px;border:3px solid #1e2035;border-top-color:#e8b86d;border-radius:50%;animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
#wrap{display:none;max-width:600px;margin:0 auto;padding:16px}
.hd{text-align:center;padding:20px 0 16px;border-bottom:1px solid #1e2035;margin-bottom:16px;position:relative}
.rfbtn{position:absolute;top:0;right:0;background:#1e2035;border:1px solid #2d2d4e;border-radius:8px;color:#9ca3af;font-size:11px;padding:6px 10px;cursor:pointer}
.tabs{display:flex;border-bottom:2px solid #1e2035;margin-bottom:16px}
.tb{flex:1;padding:10px 4px;font-size:13px;font-weight:600;border:none;background:transparent;cursor:pointer;color:#6b7280;border-bottom:2px solid transparent;margin-bottom:-2px}
.tb.on{color:#e8b86d;border-bottom-color:#e8b86d}
.pane{display:none}.pane.on{display:block}
.card{background:#12122a;border:1px solid #1e2035;border-radius:12px;padding:16px;margin-bottom:12px}
.sg{display:grid;grid-template-columns:repeat(2,1fr);gap:8px}
.sb{background:#0d0d1a;border-radius:8px;padding:12px;text-align:center;border:1px solid #1e2035}
.sl{color:#6b7280;font-size:10px;margin-bottom:4px}
.sv{font-size:18px;font-weight:700}
.mr{display:flex;align-items:center;gap:10px;padding:8px 0}
.pt{flex:1;background:#0d0d1a;border-radius:99px;height:5px;overflow:hidden}
.pf{height:100%;border-radius:99px}
.co{background:#12122a;border:1px solid #1e2035;border-radius:12px;padding:12px;margin-bottom:12px;overflow-x:auto}
.bs{display:flex;align-items:flex-end;gap:3px;height:140px;min-width:360px}
.bc{display:flex;flex-direction:column;align-items:center;gap:2px;flex:1;min-width:22px}
.bb{flex:1;width:100%;display:flex;flex-direction:column;justify-content:flex-end;position:relative}
.bf{background:#e8b86d;opacity:.9;border-radius:4px 4px 0 0;width:100%}
.bt{position:absolute;left:0;right:0;height:2px;background:#34d399;opacity:.9}
.bl{font-size:9px;color:#6b7280;text-align:center;width:100%}
.bv{font-size:8px;color:#e8b86d;font-weight:700}
/* 検索 - これは固定DOM */
#searchWrap{position:relative;margin-bottom:12px}
#searchWrap input{background:#12122a;border:1px solid #2d2d4e;border-radius:8px;color:#e5e7eb;font-size:16px;padding:10px 14px 10px 38px;width:100%;outline:none;-webkit-appearance:none}
#searchWrap .si{position:absolute;left:12px;top:50%;transform:translateY(-50%);color:#4b5563;font-size:14px;pointer-events:none}
#custCount{color:#6b7280;font-size:12px;margin-bottom:8px}
#custList{}
.ci{background:#12122a;border:1px solid #1e2035;border-radius:10px;margin-bottom:6px;overflow:hidden}
.ch{display:flex;align-items:center;gap:8px;padding:12px 14px;cursor:pointer}
.bdg{font-size:11px;font-weight:700;padding:3px 8px;border-radius:4px;border:1px solid;flex-shrink:0}
.cd{display:none;padding:12px 14px;border-top:1px solid #1e2035}
.dr{display:flex;gap:8px;margin-bottom:6px;font-size:13px}
.dl{color:#6b7280;min-width:100px;flex-shrink:0}
.dv{color:#e5e7eb;word-break:break-word}
.mb{display:flex;gap:6px;margin-bottom:10px;flex-wrap:wrap}
.mb button{background:transparent;border:1px solid #2d2d4e;border-radius:8px;color:#9ca3af;font-size:12px;padding:5px 12px;cursor:pointer}
.mb button.on{background:#1e2035;border-color:rgba(232,184,109,.3);color:#e8b86d;font-weight:700}
</style>
</head>
<body>
<div id="loading"><div class="sp"></div>読み込み中...</div>
<div id="wrap">
  <div class="hd">
    <button class="rfbtn" onclick="location.reload()">🔄 更新</button>
    <div style="color:#e8b86d;font-size:13px;font-weight:700;letter-spacing:3px;margin-bottom:8px">✦ CAST MANAGER</div>
    <div id="castName" style="color:#f3f4f6;font-size:24px;font-weight:700"></div>
    <div id="castMonth" style="color:#6b7280;font-size:12px;margin-top:6px"></div>
  </div>
  <div class="tabs">
    <button class="tb on" onclick="showTab('summary',this)">📊 サマリー</button>
    <button class="tb" onclick="showTab('chart',this)">📈 グラフ</button>
    <button class="tb" onclick="showTab('customers',this)">👥 顧客</button>
  </div>
  <div id="pSummary" class="pane on"></div>
  <div id="pChart" class="pane"></div>
  <div id="pCustomers" class="pane">
    <!-- 検索inputはここに固定。絶対に再生成しない -->
    <div id="searchWrap">
      <span class="si">🔍</span>
      <input type="search" id="custInput" placeholder="名前・種別・日付で検索..." autocomplete="off" autocorrect="off" autocapitalize="off" spellcheck="false"/>
    </div>
    <div id="custCount"></div>
    <div id="custList"></div>
  </div>
</div>

<script>
var params=new URLSearchParams(window.location.search);
var CAST_ID=params.get('id'),UID=params.get('uid');
var CAST=null,RECORDS=[],CUSTOMERS=[];
var chartMode='monthly',chartYear=String(new Date().getFullYear());

function yen(n){return n==null?'--':'¥'+Number(n).toLocaleString();}
function fd(s){if(!s)return'';var p=s.split('-');return p[1]+'/'+p[2];}
function pad(n){return String(n).padStart(2,'0');}
function tc(t){
  if(t==='指名')return{bg:'rgba(232,184,109,.12)',c:'#e8b86d',b:'rgba(232,184,109,.3)'};
  if(t==='同伴')return{bg:'rgba(52,211,153,.12)',c:'#34d399',b:'rgba(52,211,153,.3)'};
  return{bg:'rgba(167,139,250,.12)',c:'#a78bfa',b:'rgba(167,139,250,.3)'};
}
function gt(mk){var m=CAST&&CAST.monthlyTargets;return m&&m[mk]!=null?Number(m[mk]):0;}

if(!CAST_ID||!UID){
  document.getElementById('loading').innerHTML='<p style="color:#fca5a5">無効なURLです</p>';
}else{
  fetch('https://firestore.googleapis.com/v1/projects/cast-manager-b0ae2/databases/(default)/documents/users/'+UID+'/data/main')
  .then(function(r){if(!r.ok)throw new Error('HTTP '+r.status);return r.json();})
  .then(function(json){
    function pv(v){
      if(!v)return null;
      if(v.stringValue!==undefined)return v.stringValue;
      if(v.integerValue!==undefined)return Number(v.integerValue);
      if(v.doubleValue!==undefined)return Number(v.doubleValue);
      if(v.booleanValue!==undefined)return v.booleanValue;
      if(v.arrayValue)return(v.arrayValue.values||[]).map(pv);
      if(v.mapValue)return pm(v.mapValue.fields||{});
      return null;
    }
    function pm(f){var o={};Object.keys(f).forEach(function(k){o[k]=pv(f[k]);});return o;}
    var data=pm(json.fields||{});
    CAST=(data.casts||[]).find(function(c){return c.id===CAST_ID;});
    if(!CAST){document.getElementById('loading').innerHTML='<p style="color:#fca5a5">キャストが見つかりません</p>';return;}
    RECORDS=(data.records||{})[CAST_ID]||[];
    CUSTOMERS=(data.customers||{})[CAST_ID]||[];
    start();
  })
  .catch(function(e){document.getElementById('loading').innerHTML='<p style="color:#fca5a5;padding:20px;text-align:center">エラー: '+e.message+'</p>';});
}

function start(){
  document.getElementById('loading').style.display='none';
  document.getElementById('wrap').style.display='block';
  var now=new Date();
  document.getElementById('castName').textContent=CAST.name;
  document.getElementById('castMonth').textContent=(now.getMonth()+1)+'月のデータ';
  renderSummary();
  renderChart();
  renderCustomers('');
  // 検索inputイベント - 一度だけバインド
  document.getElementById('custInput').addEventListener('input',function(){
    renderCustomers(this.value);
  });
}

function showTab(id,btn){
  document.querySelectorAll('.pane').forEach(function(p){p.classList.remove('on');});
  document.querySelectorAll('.tb').forEach(function(b){b.classList.remove('on');});
  document.getElementById('p'+id.charAt(0).toUpperCase()+id.slice(1)).classList.add('on');
  btn.classList.add('on');
}

function renderSummary(){
  var now=new Date(),tm=now.getFullYear()+'-'+pad(now.getMonth()+1);
  var tr=RECORDS.filter(function(r){return r.date&&r.date.slice(0,7)===tm;});
  var ts2=tr.reduce(function(s,r){return s+Number(r.sales||0);},0);
  var tn=tr.reduce(function(s,r){return s+Number(r.nominations||0);},0);
  var tc2=tr.reduce(function(s,r){return s+Number(r.companions||0);},0);
  var tf=tr.reduce(function(s,r){return s+Number(r.floorCount||0);},0);
  var h='<div class="card"><div style="color:#e8b86d;font-weight:700;font-size:14px;margin-bottom:12px">今月の実績</div><div class="sg">';
  [['売上',yen(ts2),'#e8b86d'],['出勤',tr.length+'日','#fb923c'],['指名',tn+'組','#34d399'],['同伴',tc2+'回','#a78bfa'],['場内',tf+'組','#60a5fa']].forEach(function(x){
    h+='<div class="sb"><div class="sl">'+x[0]+'</div><div class="sv" style="color:'+x[2]+'">'+x[1]+'</div></div>';
  });
  h+='</div></div><div class="card"><div style="color:#e8b86d;font-weight:700;font-size:14px;margin-bottom:12px">直近6ヶ月</div>';
  for(var i=0;i<6;i++){
    var d=new Date(now.getFullYear(),now.getMonth()-i,1);
    var mk=d.getFullYear()+'-'+pad(d.getMonth()+1);
    var rows=RECORDS.filter(function(r){return r.date&&r.date.slice(0,7)===mk;});
    var s=rows.reduce(function(a,r){return a+Number(r.sales||0);},0);
    var tg=gt(mk),pct=tg>0?Math.min(100,Math.round(s/tg*100)):null;
    var pc=pct===null?'#9ca3af':pct>=100?'#34d399':pct>=70?'#fbbf24':'#9ca3af';
    var bc=pct===null?'#e8b86d':pct>=100?'#34d399':pct>=70?'#fbbf24':'#e8b86d';
    h+='<div class="mr" style="'+(i<5?'border-bottom:1px solid #1e2035':'')+'">';
    h+='<div style="color:'+(mk===tm?'#e8b86d':'#9ca3af')+';font-size:13px;font-weight:'+(mk===tm?700:400)+';min-width:40px">'+(d.getMonth()+1)+'月</div>';
    h+='<div style="flex:1"><div style="display:flex;justify-content:space-between;margin-bottom:'+(tg>0?'4px':'0')+'">';
    h+='<span style="color:#e8b86d;font-weight:700">'+yen(s)+'</span>';
    if(pct!==null)h+='<span style="color:'+pc+';font-size:12px">'+pct+'%</span>';
    h+='</div>';
    if(tg>0)h+='<div class="pt"><div class="pf" style="background:'+bc+';width:'+(pct||0)+'%"></div></div>';
    h+='</div></div>';
  }
  h+='</div>';
  document.getElementById('pSummary').innerHTML=h;
}

function renderChart(){
  var now=new Date();
  var ys=new Set();RECORDS.forEach(function(r){ys.add(r.date.slice(0,4));});ys.add(String(now.getFullYear()));
  var years=Array.from(ys).sort(function(a,b){return b.localeCompare(a);});
  var h='<div class="mb">';
  h+='<button class="'+(chartMode==='monthly'?'on':'')+'" onclick="setChartMode(\'monthly\')">月別</button>';
  h+='<button class="'+(chartMode==='yearly'?'on':'')+'" onclick="setChartMode(\'yearly\')">年別</button>';
  h+='</div>';
  if(chartMode==='monthly'){
    h+='<div class="mb">';
    years.forEach(function(y){h+='<button class="'+(chartYear===y?'on':'')+'" onclick="setChartYear(\''+y+'\')">'+y+'年</button>';});
    h+='</div>';
  }
  var cd=[];
  if(chartMode==='monthly'){
    for(var mi=1;mi<=12;mi++){var mk=chartYear+'-'+pad(mi);var rows=RECORDS.filter(function(r){return r.date&&r.date.slice(0,7)===mk;});cd.push({l:mi+'月',s:rows.reduce(function(a,r){return a+Number(r.sales||0);},0),t:gt(mk)});}
  }else{
    years.slice().reverse().forEach(function(yr){var rows=RECORDS.filter(function(r){return r.date.slice(0,4)===yr;});cd.push({l:yr+'年',s:rows.reduce(function(a,r){return a+Number(r.sales||0);},0),t:0});});
  }
  var mx=Math.max.apply(null,cd.map(function(d){return d.s;}));if(mx===0)mx=1;
  h+='<div class="co"><div class="bs">';
  cd.forEach(function(d){
    var bh=Math.round((d.s/mx)*120),th=d.t>0?Math.round((d.t/mx)*120):0;
    var vl=d.s>=10000?Math.round(d.s/10000)+'万':d.s>0?String(d.s):'';
    h+='<div class="bc">';
    if(vl)h+='<div class="bv">'+vl+'</div>';
    h+='<div class="bb"><div class="bf" style="height:'+bh+'px"></div>';
    if(th)h+='<div class="bt" style="bottom:'+th+'px"></div>';
    h+='</div><div class="bl">'+d.l+'</div></div>';
  });
  h+='</div><div style="display:flex;align-items:center;gap:12px;margin-top:8px;font-size:11px;color:#6b7280">';
  h+='<div style="width:12px;height:8px;background:#e8b86d;border-radius:2px"></div>売上';
  if(chartMode==='monthly')h+='<div style="width:16px;height:2px;background:#34d399;margin-left:8px"></div>目標';
  h+='</div></div>';
  document.getElementById('pChart').innerHTML=h;
}

function renderCustomers(q){
  var query=(q||'').toLowerCase();
  var list=query?CUSTOMERS.filter(function(c){return[c.name,c.type,c.bottleNeck,c.note,fd(c.date)].join(' ').toLowerCase().includes(query);}):CUSTOMERS;
  document.getElementById('custCount').textContent=list.length+'件';
  var h='';
  list.forEach(function(c,i){
    var t=tc(c.type);
    h+='<div class="ci">';
    h+='<div class="ch" onclick="td('+i+')">';
    h+='<span class="bdg" style="background:'+t.bg+';color:'+t.c+';border-color:'+t.b+'">'+c.type+'</span>';
    h+='<span style="font-weight:700;color:#f3f4f6;flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;font-size:14px">'+c.name+'</span>';
    h+='<span style="color:#6b7280;font-size:11px;flex-shrink:0">'+fd(c.date)+'</span>';
    if(c.sales>0)h+='<span style="color:#e8b86d;font-size:13px;font-weight:700;flex-shrink:0;margin-left:6px">'+yen(c.sales)+'</span>';
    h+='<span style="color:#4b5563;font-size:11px;margin-left:6px">▼</span>';
    h+='</div>';
    h+='<div id="cd'+i+'" class="cd">';
    [['種別',c.type],['売上',c.sales>0?yen(c.sales):'--'],['ボトルネック',c.bottleNeck||'--'],['オーダーボトル',c.orderBottle||'--'],['領収書',c.receipt||'--'],['備考',c.note||'--']].forEach(function(r){
      h+='<div class="dr"><span class="dl">'+r[0]+'</span><span class="dv">'+r[1]+'</span></div>';
    });
    h+='</div></div>';
  });
  if(!h)h='<div style="text-align:center;padding:40px;color:#4b5563">顧客データがありません</div>';
  document.getElementById('custList').innerHTML=h;
}

window.td=function(i){
  var d=document.getElementById('cd'+i);
  if(!d)return;
  d.style.display=d.style.display==='block'?'none':'block';
};
window.setChartMode=function(m){chartMode=m;renderChart();};
window.setChartYear=function(y){chartYear=y;renderChart();};
</script>
</body>
</html>
